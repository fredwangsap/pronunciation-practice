<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗣️ English Pronunciation Practice</title>
<style>
:root{--pri:#2d6a4f;--pri-lt:#95d5b2;--pri-dk:#1b4332;--gold:#c9a227;--bg:#f0fdf4;--card:#fff;--green:#1e6e30;--red:#922020;--blue:#1565c0;--orange:#e65100;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:#2d2d2d;min-height:100vh;}
header{background:linear-gradient(160deg,var(--pri-dk),var(--pri),#40916c);color:#fff;padding:24px 20px;text-align:center;border-bottom:4px solid var(--gold);}
header h1{font-size:clamp(1.4em,5vw,2.2em);color:#fff;margin-bottom:4px;}
header p{font-size:.88em;color:rgba(255,255,255,.75);}
.sticky{position:sticky;top:0;z-index:100;background:var(--pri-dk);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.badge{background:rgba(149,213,178,.2);border:2px solid var(--pri-lt);border-radius:20px;padding:4px 12px;color:var(--pri-lt);font-weight:700;font-size:.85em;}
.stage-tabs{display:flex;flex-wrap:wrap;gap:3px;}
.stab{padding:4px 10px;border-radius:14px;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.05);color:#fff;font-size:.75em;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;}
.stab:hover{background:rgba(255,255,255,.15);}
.stab.active{border-color:var(--pri-lt);background:rgba(149,213,178,.2);}
main{max-width:900px;margin:12px auto 40px;padding:0 14px;}
.stage{display:none;animation:fadeIn .3s ease;}
.stage.show{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.card{background:var(--card);border-radius:14px;border:2px solid rgba(45,106,79,.15);box-shadow:0 3px 16px rgba(0,0,0,.06);padding:20px;margin-bottom:14px;}
.card h2{font-size:1.15em;color:var(--pri-dk);margin-bottom:4px;}
.card h3{font-size:.95em;color:var(--pri);margin:14px 0 8px;}
.card p,.card li{font-size:.88em;line-height:1.6;color:#444;}
.tip{background:#e8f5e9;border:2px solid #a5d6a7;border-radius:10px;padding:10px 14px;margin:10px 0;font-size:.84em;line-height:1.5;color:var(--green);}
.tip strong{color:var(--pri-dk);}

/* Sound grid */
.sound-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin:12px 0;}
.sound-card{background:#f0fdf4;border:2px solid #b7e4c7;border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .2s;}
.sound-card:hover{border-color:var(--pri);transform:scale(1.05);box-shadow:0 4px 12px rgba(45,106,79,.2);}
.sound-card:active{transform:scale(.95);}
.sound-card .letter{font-size:1.6em;font-weight:700;color:var(--pri-dk);display:block;}
.sound-card .ipa{font-size:.75em;color:#666;font-style:italic;}
.sound-card .word{font-size:.72em;color:var(--pri);margin-top:2px;}
.sound-card.playing{border-color:var(--gold);background:#fffde7;animation:pulse .6s;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}

/* Vowel/Consonant specific */
.vowel-card{background:#fff3e0;border-color:#ffcc80;}
.vowel-card:hover{border-color:var(--orange);}
.long-card{background:#e3f2fd;border-color:#90caf9;}
.long-card:hover{border-color:var(--blue);}

/* Minimal pairs */
.pair-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.pair-btn{background:#fff;border:2px solid #ddd;border-radius:20px;padding:8px 16px;cursor:pointer;font-size:.9em;font-weight:600;transition:all .2s;min-width:80px;text-align:center;}
.pair-btn:hover{border-color:var(--pri);background:#f0fdf4;}
.pair-btn:active{transform:scale(.95);}
.pair-vs{font-size:.8em;color:#999;font-weight:700;}

/* Mic/Record */
.mic-area{text-align:center;margin:14px 0;padding:16px;background:#f5f5f5;border-radius:12px;border:2px dashed #ccc;}
.mic-btn{width:60px;height:60px;border-radius:50%;border:3px solid var(--pri);background:#fff;cursor:pointer;font-size:1.5em;display:inline-flex;align-items:center;justify-content:center;transition:all .3s;}
.mic-btn:hover{background:#f0fdf4;transform:scale(1.1);}
.mic-btn.recording{border-color:var(--red);background:#ffebee;animation:recPulse 1s infinite;}
@keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(146,32,32,.4);}50%{box-shadow:0 0 0 12px rgba(146,32,32,0);}}
.mic-status{font-size:.82em;color:#666;margin-top:8px;}
.mic-result{margin-top:8px;font-size:.9em;font-weight:600;padding:6px 12px;border-radius:8px;display:inline-block;}
.mic-result.ok{background:#e8f5e9;color:var(--green);}
.mic-result.bad{background:#ffebee;color:var(--red);}

/* Stress */
.stress-word{display:inline-flex;gap:2px;margin:6px 8px;}
.syl{padding:6px 10px;border-radius:8px;font-size:1em;border:2px solid #ddd;background:#f9f9f9;cursor:pointer;transition:all .2s;}
.syl:hover{border-color:var(--pri);}
.syl.stressed{background:var(--pri);color:#fff;border-color:var(--pri);font-weight:700;font-size:1.15em;}
.syl.correct{background:var(--green);color:#fff;border-color:var(--green);}
.syl.wrong{background:var(--red);color:#fff;border-color:var(--red);}

/* Sentence */
.sentence-box{background:#f9f9f9;border:2px solid #e8e8e8;border-radius:10px;padding:12px 14px;margin-bottom:10px;font-size:.92em;line-height:1.8;}
.sentence-box .strong{background:#bbdefb;padding:2px 6px;border-radius:4px;font-weight:700;}
.sentence-box .weak{color:#999;font-size:.85em;}

/* Buttons */
.btn{background:linear-gradient(135deg,var(--pri-dk),var(--pri));color:#fff;border:none;border-radius:22px;padding:9px 22px;font-size:.88em;font-weight:700;cursor:pointer;transition:all .2s;margin:4px;}
.btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(45,106,79,.3);}
.btn-sm{padding:6px 14px;font-size:.8em;}
.btn-outline{background:transparent;border:2px solid var(--pri);color:var(--pri);}
.btn-outline:hover{background:var(--pri);color:#fff;}
.nav{display:flex;justify-content:space-between;margin-top:16px;padding-top:12px;border-top:1px solid #eee;}
.nav-btn{background:transparent;border:2px solid var(--gold);color:#5c3d1a;border-radius:18px;padding:7px 16px;cursor:pointer;font-size:.86em;font-weight:600;transition:all .2s;}
.nav-btn:hover{background:var(--gold);color:#1a1a2e;}
.nav-btn.fwd{background:var(--gold);color:#1a1a2e;}

/* Progress */
.progress-bar{width:100%;height:8px;background:#e0e0e0;border-radius:4px;margin:8px 0;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--pri),var(--pri-lt));border-radius:4px;transition:width .5s;}

.fb{margin-top:10px;padding:10px 14px;border-radius:8px;font-weight:600;font-size:.86em;display:none;line-height:1.4;}
.fb.ok{background:#e8f5e9;color:var(--green);border:2px solid #a5d6a7;display:block;}
.fb.part{background:#fff8e1;color:#856404;border:2px solid #ffe082;display:block;}

@media(max-width:500px){.sound-grid{grid-template-columns:repeat(auto-fill,minmax(65px,1fr));}.pair-row{flex-direction:column;align-items:flex-start;}}
</style>
</head>

<header>
<h1>🗣️ English Pronunciation Practice</h1>

<script>
// ═══════════════════════════════
// TTS & SPEECH RECOGNITION
// ═══════════════════════════════
function speak(text,rate=0.75,pitch=1.0,cb){
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate=rate;u.pitch=pitch;
  if(cb)u.onend=cb;
  speechSynthesis.speak(u);
}

function speakSlow(text){speak(text,0.6,1.0);}
function speakNormal(text){speak(text,0.85,1.0);}

let recognition=null;
let isRecording=false;

function initRecognition(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window))return null;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const r=new SR();
  r.lang='en-US';r.continuous=false;r.interimResults=false;
  return r;
}

function startListening(onResult,onEnd){
  recognition=initRecognition();
  if(!recognition){onEnd('Speech recognition not supported');return;}
  recognition.onresult=(e)=>{
    const text=e.results[0][0].transcript.toLowerCase().trim();
    onResult(text);
  };
  recognition.onerror=(e)=>{onEnd('Could not hear you. Try again!');};
  recognition.onend=()=>{isRecording=false;};
  recognition.start();
  isRecording=true;
}

function stopListening(){
  if(recognition)recognition.stop();
  isRecording=false;
}

// ═══════════════════════════════
// DATA
// ═══════════════════════════════
const ALPHABET=[
  {l:'A',ipa:'/æ/',word:'apple',sound:'a',tip:'Open mouth wide, tongue flat and low',words2:['ant','add','ask']},
  {l:'B',ipa:'/b/',word:'ball',sound:'b',tip:'Press lips together, then pop them open with voice',words2:['bed','big','bus']},
  {l:'C',ipa:'/k/',word:'cat',sound:'c',tip:'Back of tongue touches soft palate, release air (no voice)',words2:['cup','car','cold']},
  {l:'D',ipa:'/d/',word:'dog',sound:'d',tip:'Tongue tip touches the ridge behind top teeth, with voice',words2:['dad','day','duck']},
  {l:'E',ipa:'/ɛ/',word:'egg',sound:'e',tip:'Mouth slightly open, tongue in middle height',words2:['end','else','every']},
  {l:'F',ipa:'/f/',word:'fish',sound:'f',tip:'Top teeth gently touch lower lip, blow air (no voice)',words2:['fun','food','five']},
  {l:'G',ipa:'/g/',word:'go',sound:'g',tip:'Back of tongue touches soft palate, release with voice',words2:['get','girl','give']},
  {l:'H',ipa:'/h/',word:'hat',sound:'h',tip:'Open mouth, push air out gently from throat (like fogging a mirror)',words2:['hot','home','help']},
  {l:'I',ipa:'/ɪ/',word:'ink',sound:'i',tip:'Small smile, tongue slightly raised in front',words2:['it','in','is']},
  {l:'J',ipa:'/dʒ/',word:'jump',sound:'j',tip:'Tongue touches roof, then releases like "d" + "zh" together',words2:['job','jam','juice']},
  {l:'K',ipa:'/k/',word:'kite',sound:'k',tip:'Same as C — back of tongue touches soft palate, no voice',words2:['king','keep','kick']},
  {l:'L',ipa:'/l/',word:'leg',sound:'l',tip:'Tongue tip touches the ridge behind top teeth, air flows around sides',words2:['look','like','let']},
  {l:'M',ipa:'/m/',word:'map',sound:'m',tip:'Press lips together, hum through your nose',words2:['mum','milk','moon']},
  {l:'N',ipa:'/n/',word:'nose',sound:'n',tip:'Tongue tip touches ridge behind top teeth, hum through nose',words2:['no','name','new']},
  {l:'O',ipa:'/ɒ/',word:'orange',sound:'o',tip:'Round lips into a circle, mouth open, tongue low and back',words2:['on','off','odd']},
  {l:'P',ipa:'/p/',word:'pen',sound:'p',tip:'Press lips together, then pop with a puff of air (no voice)',words2:['put','park','pig']},

  {l:'W',ipa:'/w/',word:'wet',sound:'w',tip:'Round lips tightly (like blowing a candle), then open quickly',words2:['win','wait','walk']},

  {l:'Y',ipa:'/j/',word:'yes',sound:'y',tip:'Tongue raised near roof of mouth, like a quick "ee" then open',words2:['you','year','yell']},

// Common letter combinations (phonics patterns)
const COMBOS=[
  {combo:'sh',ipa:'/ʃ/',sound:'sh',tip:'Lips pushed forward (like telling someone to be quiet: "shh!")',words:['ship','shop','she','fish','wish']},
  {combo:'ch',ipa:'/tʃ/',sound:'ch',tip:'Start with tongue on roof (like T), then release as "sh"',words:['chip','chair','lunch','much','teacher']},

  {combo:'or',ipa:'/ɔːr/',sound:'or',tip:'Round lips, tongue back and low, then add R',words:['for','door','more','horse','morning','short']},
  {combo:'ai',ipa:'/eɪ/',sound:'ai',tip:'Long A sound — start with "eh" then glide to "ee"',words:['rain','train','wait','paint','tail','sail']},
  {combo:'ay',ipa:'/eɪ/',sound:'ay',tip:'Same as "ai" — long A sound, usually at end of words',words:['day','play','say','way','today','stay']},
  {combo:'oi',ipa:'/ɔɪ/',sound:'oi',tip:'Start with round lips "or" then glide to "ee"',words:['oil','coin','join','point','noise','voice']},
  {combo:'oy',ipa:'/ɔɪ/',sound:'oy',tip:'Same as "oi" — usually at the end of words',words:['boy','toy','enjoy','joy','annoy']},
  {combo:'aw',ipa:'/ɔː/',sound:'aw',tip:'Open mouth with round lips, tongue low and back',words:['saw','draw','paw','law','straw','yawn']},
  {combo:'wh',ipa:'/w/',sound:'wh',tip:'Same as W in most English — round lips then open',words:['what','when','where','why','which','white']},
  {combo:'wr',ipa:'/r/',sound:'r',tip:'The W is silent! Just say the R sound',words:['write','wrong','wrap','wrist']},
  {combo:'kn',ipa:'/n/',sound:'n',tip:'The K is silent! Just say the N sound',words:['know','knee','knife','knock','knight']},
  {combo:'ph',ipa:'/f/',sound:'f',tip:'Same as F — top teeth on lower lip, blow air',words:['phone','photo','elephant','dolphin','alphabet']},
];

// ═══════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════
let currentStage=0;
const STAGES=['Alphabet Sounds','Vowel Sounds','Consonant Sounds','Syllables & Stress','Sentences & Rhythm','Fluency Practice'];

function init(){
  buildStageTabs();
  renderAllStages();
  goStage(0);
}

function buildStageTabs(){
  const tabs=document.getElementById('stage-tabs');
  tabs.innerHTML='';
  STAGES.forEach((s,i)=>{
    const b=document.createElement('button');
    b.className='stab'+(i===currentStage?' active':'');
    b.textContent=(i+1)+'. '+s;
    b.onclick=()=>goStage(i);
    tabs.appendChild(b);
  });
}

function goStage(n){
  currentStage=n;
  document.querySelectorAll('.stage').forEach(s=>s.classList.remove('show'));
  document.getElementById('stage-'+n).classList.add('show');
  document.getElementById('cur-stage').textContent=n+1;
  buildStageTabs();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderAllStages(){
  const main=document.getElementById('main');
  main.innerHTML='';
  main.appendChild(renderStage1());
  main.appendChild(renderStage2());
  main.appendChild(renderStage3());
  main.appendChild(renderStage4());
  main.appendChild(renderStage5());
  main.appendChild(renderStage6());
}

// STAGE 1: ALPHABET SOUNDS
// ═══════════════════════════════
function renderStage1(){
  const div=document.createElement('div');div.className='stage';div.id='stage-0';
  div.innerHTML=`

      <h2>🔤 Stage 1: Alphabet Sounds</h2>
      <p>Learn the <strong>sound</strong> each letter makes (not just its name). Click any letter to hear it!</p>
      <div class="tip"><strong>💡 Remember:</strong> The letter name (A = "ay") is different from the letter sound (A = /æ/ like in "apple"). Focus on the SOUND!</div>
      <h3>Click to hear each letter sound:</h3>
      <div class="sound-grid" id="alpha-grid"></div>
      <div id="alpha-detail" style="margin-top:14px;padding:14px;background:#f5f5f0;border-radius:10px;display:none;">
        <div id="alpha-detail-content"></div>
      </div>
    </div>
    <div class="card">
      <h2>🔗 Common Letter Combinations (Phonics)</h2>
      <p>These letter groups make <strong>special sounds</strong> different from individual letters. Click to hear!</p>
      <div class="tip"><strong>💡 Key idea:</strong> When certain letters come together, they make a brand new sound. For example, S + H = "sh" (not "s" then "h")!</div>

      <div id="combo-detail" style="margin-top:14px;padding:14px;background:#fff8e1;border-radius:10px;border:2px solid #ffe082;display:none;">
        <div id="combo-detail-content"></div>
      </div>
    </div>
    <div class="card">
      <h3>🎤 Try it yourself!</h3>
      <p>Click a letter or combination above, then click the microphone to say the word. The app will check if you said it correctly!</p>
      <div class="mic-area">
        <div style="font-size:1.3em;font-weight:700;color:var(--pri-dk);margin-bottom:8px;" id="mic1-target">Click a letter first</div>
        <button class="mic-btn" id="mic1-btn" onclick="recordAlpha()">🎤</button>
        <div class="mic-status" id="mic1-status">Click to record</div>
        <div id="mic1-result"></div>
      </div>
    </div>
    <div class="nav">
      <span></span>
      <button class="nav-btn fwd" onclick="goStage(1)">Stage 2: Vowels ▶</button>
    </div>`;
  setTimeout(()=>{
    const grid=document.getElementById('alpha-grid');
    if(!grid)return;
    ALPHABET.forEach(a=>{
      const card=document.createElement('div');
      card.className='sound-card';
      card.innerHTML=`<span class="letter">${a.l}</span><span class="ipa">${a.ipa}</span><span class="word">${a.word}</span>`;

let alpha_target='';
function recordAlpha(){
  const target=document.getElementById('mic1-target').dataset.word;
  if(!target){document.getElementById('mic1-status').textContent='Click a letter first!';return;}
  const btn=document.getElementById('mic1-btn');
  const status=document.getElementById('mic1-status');
  const result=document.getElementById('mic1-result');
  if(isRecording){stopListening();btn.classList.remove('recording');status.textContent='Click to record';return;}
  btn.classList.add('recording');
  status.textContent='🔴 Listening...';
  result.innerHTML='';
  startListening((text)=>{
    btn.classList.remove('recording');
    status.textContent='Click to record';
    if(text.includes(target.toLowerCase())){
      result.innerHTML=`<span class="mic-result ok">✅ Great! You said "${text}" — correct!</span>`;
    } else {
      result.innerHTML=`<span class="mic-result bad">❌ You said "${text}" — try again! Target: "${target}"</span>`;
    }
  },(err)=>{
    btn.classList.remove('recording');
    status.textContent=err;
  });
}

// STAGE 4: SYLLABLES & STRESS
// ═══════════════════════════════
function renderStage4(){
  const div=document.createElement('div');div.className='stage';div.id='stage-3';
  let html=`<div class="card"><h2>🥁 Stage 4: Syllables & Word Stress</h2>
    <p>Every English word has a <strong>stressed syllable</strong> — it's LOUDER and LONGER than the others.</p>
    <div class="tip"><strong>💡 How to find stress:</strong> Clap the word — which beat is STRONGEST? That's the stress! Example: ba-NA-na 👏👏👏 (middle clap is loudest)</div>
    <h3>Click to hear, then click which syllable is stressed:</h3>
    <div id="stress-exercise"></div>
    <button class="btn" onclick="chkStress()">✓ Check My Answers</button>
    <div class="fb" id="fb-stress"></div>
  </div>
  <div class="nav"><button class="nav-btn" onclick="goStage(2)">◀ Stage 3</button><button class="nav-btn fwd" onclick="goStage(4)">Stage 5: Sentences ▶</button></div>`;
  div.innerHTML=html;
  setTimeout(()=>{
    const ex=document.getElementById('stress-exercise');if(!ex)return;
    STRESS_WORDS.forEach((w,wi)=>{
      const row=document.createElement('div');
      row.style.cssText='margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;';
      let inner=`<button class="btn btn-sm" onclick="speak('${w.word}',0.7)">🔊</button><span style="font-size:.85em;color:#888;min-width:80px;">${w.word}:</span>`;
      inner+=`<span class="stress-word" id="sw-${wi}">`;
      w.syls.forEach((s,si)=>{
        inner+=`<span class="syl" data-wi="${wi}" data-si="${si}" onclick="pickStress(${wi},${si})">${s.toLowerCase()}</span>`;
      });
      inner+=`</span>`;
      row.innerHTML=inner;
      ex.appendChild(row);
    });
  },100);
  return div;
}

function pickStress(wi,si){
  const container=document.getElementById(`sw-${wi}`);
  container.querySelectorAll('.syl').forEach(s=>{s.classList.remove('stressed');});
  container.querySelectorAll('.syl')[si].classList.add('stressed');
}

function chkStress(){
  let ok=0;
  STRESS_WORDS.forEach((w,wi)=>{
    const container=document.getElementById(`sw-${wi}`);
    const syls=container.querySelectorAll('.syl');
    syls.forEach((s,si)=>{
      s.classList.remove('correct','wrong','stressed');
      if(si===w.stress)s.classList.add('correct');
      else if(s.classList.contains('stressed'))s.classList.add('wrong');
    });
    const picked=container.querySelector('.stressed,.correct,.wrong');
    if(picked&&picked.classList.contains('correct'))ok++;
    syls[w.stress].classList.add('correct');
  });
  const fb=document.getElementById('fb-stress');
  if(ok===STRESS_WORDS.length){fb.className='fb ok';fb.textContent=`🎉 Perfect! ${ok}/${STRESS_WORDS.length} correct!`;}
  else{fb.className='fb part';fb.textContent=`👍 ${ok}/${STRESS_WORDS.length} correct. Green shows the stressed syllable.`;}
}

// STAGE 5: SENTENCES & RHYTHM
// ═══════════════════════════════
function renderStage5(){
  const div=document.createElement('div');div.className='stage';div.id='stage-4';
  let html=`<div class="card"><h2>🎵 Stage 5: Sentence Rhythm & Intonation</h2>
    <p>In English, <strong>content words</strong> (nouns, verbs, adjectives) are stressed. <strong>Function words</strong> (a, the, is, to) are weak and fast.</p>
    <div class="tip"><strong>💡 English sounds like music!</strong> It has a DA-da-DA-da rhythm. Stressed words are LOUD and CLEAR. Weak words are quick and quiet.</div>
    <h3>Listen to these sentences — notice the rhythm:</h3>`;
  SENTENCES.forEach((s,i)=>{
    const words=s.text.split(' ').map(w=>{
      const clean=w.replace(/[.,!?]/g,'').toLowerCase();
      if(s.strong.includes(clean))return `<span class="strong">${w}</span>`;
      return `<span class="weak">${w}</span>`;
    }).join(' ');
    html+=`<div class="sentence-box"><button class="btn btn-sm" onclick="speakNormal('${s.text.replace(/'/g,"\\'")}')">🔊</button> ${words}</div>`;
  });
  html+=`<p style="margin-top:12px;font-size:.85em;color:#666;"><strong>Blue</strong> = stressed (loud & clear) · <span style="color:#999;">Grey</span> = weak (quick & quiet)</p></div>`;

  html+=`<div class="card"><h3>🎤 Shadowing Practice</h3>
    <p>Listen to a sentence, then <strong>immediately repeat</strong> it copying the rhythm and stress.</p>
    <div id="shadow-sentences"></div>
    <div class="mic-area">
      <div style="font-size:1.1em;font-weight:700;color:var(--pri-dk);margin-bottom:8px;" id="mic5-target">Click a sentence to practice</div>
      <button class="mic-btn" id="mic5-btn" onclick="recordSentence()">🎤</button>
      <div class="mic-status" id="mic5-status">Listen first, then record</div>
      <div id="mic5-result"></div>
    </div></div>
  <div class="nav"><button class="nav-btn" onclick="goStage(3)">◀ Stage 4</button><button class="nav-btn fwd" onclick="goStage(5)">Stage 6: Fluency ▶</button></div>`;
  div.innerHTML=html;
  setTimeout(()=>{
    const ss=document.getElementById('shadow-sentences');if(!ss)return;
    SENTENCES.forEach((s,i)=>{
      const b=document.createElement('button');b.className='btn btn-sm btn-outline';b.style.margin='3px';
      b.textContent=s.text;
      b.onclick=()=>{speakNormal(s.text);document.getElementById('mic5-target').textContent=s.text;document.getElementById('mic5-target').dataset.sentence=s.text;};
      ss.appendChild(b);
    });
  },100);
  return div;
}

function recordSentence(){
  const target=document.getElementById('mic5-target').dataset.sentence;
  if(!target){document.getElementById('mic5-status').textContent='Click a sentence first!';return;}
  const btn=document.getElementById('mic5-btn'),status=document.getElementById('mic5-status'),result=document.getElementById('mic5-result');
  if(isRecording){stopListening();btn.classList.remove('recording');status.textContent='Listen first, then record';return;}
  btn.classList.add('recording');status.textContent='🔴 Listening... Speak now!';result.innerHTML='';
  startListening((text)=>{
    btn.classList.remove('recording');status.textContent='Listen first, then record';
    const targetWords=target.toLowerCase().replace(/[.,!?]/g,'').split(' ');
    const spokenWords=text.toLowerCase().split(' ');
    const matches=targetWords.filter(w=>spokenWords.includes(w)).length;
    const pct=Math.round(matches/targetWords.length*100);
    if(pct>=80){result.innerHTML=`<span class="mic-result ok">✅ ${pct}% match! Great rhythm! You said: "${text}"</span>`;}
    else{result.innerHTML=`<span class="mic-result bad">🔄 ${pct}% match. You said: "${text}". Try again!</span>`;}
  },(err)=>{btn.classList.remove('recording');status.textContent=err;});
}

      <div style="font-size:1em;font-weight:600;color:var(--pri-dk);margin-bottom:8px;" id="mic6-target">Pick a tongue twister above</div>
      <button class="mic-btn" id="mic6-btn" onclick="recordTwister()">🎤</button>
      <div class="mic-status" id="mic6-status">Click to record</div>
      <div id="mic6-result"></div>
    </div></div>
    <div class="card"><h3>📋 Daily Practice Checklist</h3>
    <p>Try to do these every day (15-20 minutes total):</p>
    <ul style="padding-left:20px;margin-top:8px;">
      <li>🔤 Review 5 letter sounds (3 min)</li>
      <li>👂 Listen to 3 minimal pairs (3 min)</li>
      <li>🎤 Shadow 3 sentences (5 min)</li>
      <li>🐢 Practice 1 tongue twister slow → fast (3 min)</li>
      <li>📱 Test with speech-to-text (2 min)</li>
    </ul></div>
    <div class="nav"><button class="nav-btn" onclick="goStage(4)">◀ Stage 5</button><span style="font-size:.85em;color:var(--pri);">🎉 You've reached the end! Keep practising daily!</span></div>`;
  div.innerHTML=html;
  setTimeout(()=>{
    // Set first tongue twister as default target
    document.getElementById('mic6-target').dataset.text=TONGUE_TWISTERS[0];
    // Make clicking tongue twisters set the target
    document.querySelectorAll('#stage-5 .sentence-box').forEach((box,i)=>{
      box.style.cursor='pointer';
      box.onclick=(e)=>{
        if(e.target.tagName==='BUTTON')return;
        document.getElementById('mic6-target').textContent=TONGUE_TWISTERS[i];
        document.getElementById('mic6-target').dataset.text=TONGUE_TWISTERS[i];
      };
    });
  },100);
  return div;
}

function recordTwister(){
  const target=document.getElementById('mic6-target').dataset.text;
  if(!target){document.getElementById('mic6-status').textContent='Pick a tongue twister first!';return;}
  const btn=document.getElementById('mic6-btn'),status=document.getElementById('mic6-status'),result=document.getElementById('mic6-result');
  if(isRecording){stopListening();btn.classList.remove('recording');status.textContent='Click to record';return;}
  btn.classList.add('recording');status.textContent='🔴 Listening... Say it!';result.innerHTML='';
  startListening((text)=>{
    btn.classList.remove('recording');status.textContent='Click to record';
    const targetWords=target.toLowerCase().replace(/[.,!?]/g,'').split(' ');
    const spokenWords=text.toLowerCase().replace(/[.,!?]/g,'').split(' ');
    const matches=targetWords.filter(w=>spokenWords.includes(w)).length;
    const pct=Math.round(matches/targetWords.length*100);
    if(pct>=75){result.innerHTML=`<span class="mic-result ok">✅ ${pct}% accuracy! Well done! "${text}"</span>`;}
    else{result.innerHTML=`<span class="mic-result bad">🔄 ${pct}% — Keep trying! You said: "${text}"</span>`;}
  },(err)=>{btn.classList.remove('recording');status.textContent=err;});
}

// START
init();
</script>
