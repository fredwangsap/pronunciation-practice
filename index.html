<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗣️ English Pronunciation Practice</title>
<style>
:root{--pri:#2d6a4f;--pri-lt:#95d5b2;--pri-dk:#1b4332;--gold:#c9a227;--bg:#f0fdf4;--card:#fff;--green:#1e6e30;--red:#922020;--blue:#1565c0;--orange:#e65100;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:#2d2d2d;min-height:100vh;}
header{background:linear-gradient(160deg,var(--pri-dk),var(--pri),#40916c);color:#fff;padding:24px 20px;text-align:center;border-bottom:4px solid var(--gold);}
header h1{font-size:clamp(1.4em,5vw,2.2em);color:#fff;margin-bottom:4px;}
header p{font-size:.88em;color:rgba(255,255,255,.75);}
.sticky{position:sticky;top:0;z-index:100;background:var(--pri-dk);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.badge{background:rgba(149,213,178,.2);border:2px solid var(--pri-lt);border-radius:20px;padding:4px 12px;color:var(--pri-lt);font-weight:700;font-size:.85em;}
.stage-tabs{display:flex;flex-wrap:wrap;gap:3px;}
.stab{padding:4px 10px;border-radius:14px;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.05);color:#fff;font-size:.72em;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;}
.stab:hover{background:rgba(255,255,255,.15);}
.stab.active{border-color:var(--pri-lt);background:rgba(149,213,178,.2);}
main{max-width:900px;margin:12px auto 40px;padding:0 14px;}
.stage{display:none;animation:fadeIn .3s ease;}
.stage.show{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.card{background:var(--card);border-radius:14px;border:2px solid rgba(45,106,79,.15);box-shadow:0 3px 16px rgba(0,0,0,.06);padding:20px;margin-bottom:14px;}
.card h2{font-size:1.15em;color:var(--pri-dk);margin-bottom:4px;}
.card h3{font-size:.95em;color:var(--pri);margin:14px 0 8px;}
.card p,.card li{font-size:.88em;line-height:1.6;color:#444;}
.tip{background:#e8f5e9;border:2px solid #a5d6a7;border-radius:10px;padding:10px 14px;margin:10px 0;font-size:.84em;line-height:1.5;color:var(--green);}
.tip strong{color:var(--pri-dk);}
.warn{background:#fff3e0;border:2px solid #ffcc80;border-radius:10px;padding:10px 14px;margin:10px 0;font-size:.84em;line-height:1.5;color:var(--orange);}

/* Sound grid */
.sound-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin:12px 0;}
.sound-card{background:#f0fdf4;border:2px solid #b7e4c7;border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .2s;}
.sound-card:hover{border-color:var(--pri);transform:scale(1.05);box-shadow:0 4px 12px rgba(45,106,79,.2);}
.sound-card:active{transform:scale(.95);}
.sound-card .letter{font-size:1.5em;font-weight:700;color:var(--pri-dk);display:block;}
.sound-card .ipa{font-size:.72em;color:#666;font-style:italic;}
.sound-card .word{font-size:.7em;color:var(--pri);margin-top:2px;}
.sound-card.playing{border-color:var(--gold);background:#fffde7;animation:pulse .6s;}
.sound-card.vowel-card{background:#fff3e0;border-color:#ffcc80;}
.sound-card.vowel-card:hover{border-color:var(--orange);}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}

/* Tables */
.ipa-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:.82em;}
.ipa-table th{background:var(--pri-dk);color:#fff;padding:7px 8px;text-align:left;font-size:.85em;}
.ipa-table td{padding:6px 8px;border-bottom:1px solid #eee;}
.ipa-table tr:nth-child(even){background:#f8fdf8;}
.ipa-table .sym{font-weight:700;color:var(--orange);font-size:1.05em;}
.ipa-table .long-row{background:#e3f2fd !important;}
.ipa-table .diph-row{background:#fff3e0 !important;}

/* Minimal pairs */
.pair-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.pair-btn{background:#fff;border:2px solid #ddd;border-radius:20px;padding:8px 16px;cursor:pointer;font-size:.9em;font-weight:600;transition:all .2s;min-width:80px;text-align:center;}
.pair-btn:hover{border-color:var(--pri);background:#f0fdf4;}
.pair-btn:active{transform:scale(.95);}
.pair-vs{font-size:.8em;color:#999;font-weight:700;}

/* Mic/Record */
.mic-area{text-align:center;margin:14px 0;padding:16px;background:#f5f5f5;border-radius:12px;border:2px dashed #ccc;}
.mic-btn{width:60px;height:60px;border-radius:50%;border:3px solid var(--pri);background:#fff;cursor:pointer;font-size:1.5em;display:inline-flex;align-items:center;justify-content:center;transition:all .3s;}
.mic-btn:hover{background:#f0fdf4;transform:scale(1.1);}
.mic-btn.recording{border-color:var(--red);background:#ffebee;animation:recPulse 1s infinite;}
@keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(146,32,32,.4);}50%{box-shadow:0 0 0 12px rgba(146,32,32,0);}}
.mic-status{font-size:.82em;color:#666;margin-top:8px;}
.mic-result{margin-top:8px;font-size:.9em;font-weight:600;padding:6px 12px;border-radius:8px;display:inline-block;}
.mic-result.ok{background:#e8f5e9;color:var(--green);}
.mic-result.bad{background:#ffebee;color:var(--red);}

/* Stress */
.stress-word{display:inline-flex;gap:2px;margin:6px 8px;}
.syl{padding:6px 10px;border-radius:8px;font-size:1em;border:2px solid #ddd;background:#f9f9f9;cursor:pointer;transition:all .2s;}
.syl:hover{border-color:var(--pri);}
.syl.stressed{background:var(--pri);color:#fff;border-color:var(--pri);font-weight:700;font-size:1.15em;}
.syl.correct{background:var(--green);color:#fff;border-color:var(--green);}
.syl.wrong{background:var(--red);color:#fff;border-color:var(--red);}

/* Sentence */
.sentence-box{background:#f9f9f9;border:2px solid #e8e8e8;border-radius:10px;padding:12px 14px;margin-bottom:10px;font-size:.92em;line-height:1.8;}
.sentence-box .strong{background:#bbdefb;padding:2px 6px;border-radius:4px;font-weight:700;}
.sentence-box .weak{color:#999;font-size:.85em;}
.sentence-box .link{background:#c8e6c9;padding:2px 6px;border-radius:4px;font-weight:600;color:var(--green);}

/* Buttons */
.btn{background:linear-gradient(135deg,var(--pri-dk),var(--pri));color:#fff;border:none;border-radius:22px;padding:9px 22px;font-size:.88em;font-weight:700;cursor:pointer;transition:all .2s;margin:4px;}
.btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(45,106,79,.3);}
.btn-sm{padding:6px 14px;font-size:.8em;}
.btn-outline{background:transparent;border:2px solid var(--pri);color:var(--pri);}
.btn-outline:hover{background:var(--pri);color:#fff;}
.nav{display:flex;justify-content:space-between;margin-top:16px;padding-top:12px;border-top:1px solid #eee;}
.nav-btn{background:transparent;border:2px solid var(--gold);color:#5c3d1a;border-radius:18px;padding:7px 16px;cursor:pointer;font-size:.86em;font-weight:600;transition:all .2s;}
.nav-btn:hover{background:var(--gold);color:#1a1a2e;}
.nav-btn.fwd{background:var(--gold);color:#1a1a2e;}

.fb{margin-top:10px;padding:10px 14px;border-radius:8px;font-weight:600;font-size:.86em;display:none;line-height:1.4;}
.fb.ok{background:#e8f5e9;color:var(--green);border:2px solid #a5d6a7;display:block;}
.fb.part{background:#fff8e1;color:#856404;border:2px solid #ffe082;display:block;}

/* Game */
.game-score{display:flex;gap:12px;justify-content:center;margin:10px 0;flex-wrap:wrap;}
.game-badge{background:rgba(45,106,79,.08);border:2px solid var(--pri);border-radius:20px;padding:5px 14px;font-size:.85em;font-weight:600;color:var(--pri-dk);}
.game-word{font-size:clamp(2em,8vw,3.5em);font-weight:700;color:var(--pri-dk);letter-spacing:3px;text-align:center;margin:16px 0 8px;}
.game-patterns{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:10px 0;}
.game-pattern{background:#e8f5e9;border:2px solid #a5d6a7;border-radius:8px;padding:4px 10px;font-size:.85em;}
.game-pattern strong{color:var(--pri-dk);}
.game-pattern em{color:var(--orange);}
.game-history-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #eee;font-size:.85em;}

@media(max-width:500px){.sound-grid{grid-template-columns:repeat(auto-fill,minmax(65px,1fr));}.pair-row{flex-direction:column;align-items:flex-start;}.ipa-table{font-size:.75em;}}
</style>
</head>
<body>
<header>
<h1>🗣️ English Pronunciation Practice</h1>
<p>5 steps to clear English pronunciation · Listen · Practice · Record</p>
</header>
<div class="sticky">
<div class="badge">Step <span id="cur-stage">1</span>/6</div>
<div class="stage-tabs" id="stage-tabs"></div>
</div>
<main id="main"></main>

<script>
// ═══════════════════════════════
// TTS & SPEECH RECOGNITION
// ═══════════════════════════════
function speak(text,rate=0.75,pitch=1.0,cb){
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate=rate;u.pitch=pitch;
  if(cb)u.onend=cb;
  speechSynthesis.speak(u);
}
function speakSlow(text){speak(text,0.55,1.0);}
function speakNormal(text){speak(text,0.85,1.0);}

let recognition=null,isRecording=false;
function initRecognition(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window))return null;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const r=new SR();r.lang='en-US';r.continuous=false;r.interimResults=false;return r;
}
function startListening(onResult,onEnd){
  recognition=initRecognition();
  if(!recognition){onEnd('Speech recognition not supported in this browser');return;}
  recognition.onresult=(e)=>{const text=e.results[0][0].transcript.toLowerCase().trim();onResult(text);};
  recognition.onerror=()=>{onEnd('Could not hear you. Try again!');};
  recognition.onend=()=>{isRecording=false;};
  recognition.start();isRecording=true;
}
function stopListening(){if(recognition)recognition.stop();isRecording=false;}

// ═══════════════════════════════
// DATA
// ═══════════════════════════════

// -- IPA: All 44 phonemes --
const VOWELS_IPA=[
  {n:1,sym:'/æ/',type:'short',desc:'Open mouth wide, tongue flat',ex:'cat, hat, man',word:'cat'},
  {n:2,sym:'/ɛ/',type:'short',desc:'Mouth slightly open, relaxed',ex:'bed, red, ten',word:'bed'},
  {n:3,sym:'/ɪ/',type:'short',desc:'Small smile, tongue slightly raised',ex:'sit, fish, big',word:'sit'},
  {n:4,sym:'/ɒ/',type:'short',desc:'Round open mouth, tongue low back',ex:'hot, dog, box',word:'hot'},
  {n:5,sym:'/ʌ/',type:'short',desc:'Relaxed open mouth, tongue centre',ex:'cup, bus, run',word:'cup'},
  {n:6,sym:'/ʊ/',type:'short',desc:'Lips slightly rounded, relaxed',ex:'book, put, look',word:'book'},
  {n:7,sym:'/ə/',type:'short',desc:'Schwa — the laziest, most common sound',ex:'about, teacher, sofa',word:'about'},
  {n:8,sym:'/iː/',type:'long',desc:'Wide smile, tongue high front',ex:'see, tree, eat',word:'see'},
  {n:9,sym:'/ɑː/',type:'long',desc:'Mouth wide open, tongue low back',ex:'car, far, star',word:'car'},
  {n:10,sym:'/ɔː/',type:'long',desc:'Round lips, tongue low back',ex:'call, door, four',word:'call'},
  {n:11,sym:'/uː/',type:'long',desc:'Lips tightly rounded forward',ex:'blue, food, moon',word:'blue'},
  {n:12,sym:'/ɜː/',type:'long',desc:'Tongue centre, lips slightly rounded',ex:'bird, her, nurse',word:'bird'},
  {n:13,sym:'/eɪ/',type:'diphthong',desc:'Start "eh" glide to "ee"',ex:'cake, day, rain',word:'cake'},
  {n:14,sym:'/aɪ/',type:'diphthong',desc:'Start "ah" glide to "ee"',ex:'like, night, my',word:'like'},
  {n:15,sym:'/ɔɪ/',type:'diphthong',desc:'Start round "or" glide to "ee"',ex:'boy, coin, voice',word:'boy'},
  {n:16,sym:'/aʊ/',type:'diphthong',desc:'Start "ah" glide to round "oo"',ex:'house, cow, out',word:'house'},
  {n:17,sym:'/oʊ/',type:'diphthong',desc:'Start "oh" glide to round "oo"',ex:'go, home, show',word:'go'},
  {n:18,sym:'/ɪə/',type:'diphthong',desc:'Start "ih" glide to "uh"',ex:'ear, here, near',word:'ear'},
  {n:19,sym:'/eə/',type:'diphthong',desc:'Start "eh" glide to "uh"',ex:'air, there, care',word:'air'},
  {n:20,sym:'/ʊə/',type:'diphthong',desc:'Start "oo" glide to "uh"',ex:'tour, pure, sure',word:'tour'},
];

const CONSONANTS_IPA=[
  {n:1,sym:'/p/',type:'stop',voice:'voiceless',desc:'Lips pop, no voice',ex:'pen, cup',word:'pen'},
  {n:2,sym:'/b/',type:'stop',voice:'voiced',desc:'Lips pop, WITH voice',ex:'ball, cab',word:'ball'},
  {n:3,sym:'/t/',type:'stop',voice:'voiceless',desc:'Tongue taps ridge, no voice',ex:'ten, cat',word:'ten'},
  {n:4,sym:'/d/',type:'stop',voice:'voiced',desc:'Tongue taps ridge, WITH voice',ex:'dog, bed',word:'dog'},
  {n:5,sym:'/k/',type:'stop',voice:'voiceless',desc:'Back tongue hits palate, no voice',ex:'cat, book',word:'cat'},
  {n:6,sym:'/g/',type:'stop',voice:'voiced',desc:'Back tongue hits palate, WITH voice',ex:'go, big',word:'go'},
  {n:7,sym:'/f/',type:'fricative',voice:'voiceless',desc:'Top teeth on lower lip, blow',ex:'fish, leaf',word:'fish'},
  {n:8,sym:'/v/',type:'fricative',voice:'voiced',desc:'Top teeth on lower lip, buzz',ex:'van, love',word:'van'},
  {n:9,sym:'/θ/',type:'fricative',voice:'voiceless',desc:'Tongue between teeth, blow',ex:'think, bath',word:'think'},
  {n:10,sym:'/ð/',type:'fricative',voice:'voiced',desc:'Tongue between teeth, buzz',ex:'this, mother',word:'this'},
  {n:11,sym:'/s/',type:'fricative',voice:'voiceless',desc:'Tongue near ridge, hiss',ex:'sun, bus',word:'sun'},
  {n:12,sym:'/z/',type:'fricative',voice:'voiced',desc:'Tongue near ridge, buzz',ex:'zoo, is',word:'zoo'},
  {n:13,sym:'/ʃ/',type:'fricative',voice:'voiceless',desc:'Lips forward, "shh!"',ex:'ship, fish',word:'ship'},
  {n:14,sym:'/ʒ/',type:'fricative',voice:'voiced',desc:'Lips forward, buzzy "zh"',ex:'measure, vision',word:'measure'},
  {n:15,sym:'/tʃ/',type:'affricate',voice:'voiceless',desc:'Start /t/ release as /ʃ/',ex:'chip, lunch',word:'chip'},
  {n:16,sym:'/dʒ/',type:'affricate',voice:'voiced',desc:'Start /d/ release as /ʒ/',ex:'jump, bridge',word:'jump'},
  {n:17,sym:'/m/',type:'nasal',voice:'voiced',desc:'Lips together, hum through nose',ex:'map, swim',word:'map'},
  {n:18,sym:'/n/',type:'nasal',voice:'voiced',desc:'Tongue on ridge, hum nose',ex:'nose, sun',word:'nose'},
  {n:19,sym:'/ŋ/',type:'nasal',voice:'voiced',desc:'Back tongue up, hum nose',ex:'sing, thing',word:'sing'},
  {n:20,sym:'/l/',type:'lateral',voice:'voiced',desc:'Tongue tip on ridge, air sides',ex:'leg, ball',word:'leg'},
  {n:21,sym:'/r/',type:'approximant',voice:'voiced',desc:'Tongue curls back, no touch',ex:'run, car',word:'run'},
  {n:22,sym:'/w/',type:'glide',voice:'voiced',desc:'Round lips then open quickly',ex:'wet, swim',word:'wet'},
  {n:23,sym:'/j/',type:'glide',voice:'voiced',desc:'Tongue high, quick "ee" then open',ex:'yes, use',word:'yes'},
  {n:24,sym:'/h/',type:'glottal',voice:'voiceless',desc:'Open throat, gentle breath',ex:'hat, home',word:'hat'},
];

// -- Minimal Pairs --
const MINIMAL_PAIRS=[
  {a:'ship',b:'sheep',focus:'/ɪ/ vs /iː/ — short vs long'},
  {a:'bit',b:'beat',focus:'/ɪ/ vs /iː/'},
  {a:'cat',b:'cut',focus:'/æ/ vs /ʌ/'},
  {a:'bed',b:'bad',focus:'/ɛ/ vs /æ/'},
  {a:'pull',b:'pool',focus:'/ʊ/ vs /uː/'},
  {a:'live',b:'leave',focus:'/ɪ/ vs /iː/'},
  {a:'fan',b:'van',focus:'/f/ vs /v/'},
  {a:'think',b:'this',focus:'/θ/ vs /ð/'},
  {a:'light',b:'right',focus:'/l/ vs /r/'},
  {a:'wet',b:'vet',focus:'/w/ vs /v/'},
  {a:'pin',b:'bin',focus:'/p/ vs /b/'},
  {a:'coat',b:'goat',focus:'/k/ vs /g/'},
];

// -- Letter Combos --
const COMBOS=[
  {combo:'sh',ipa:'/ʃ/',words:['ship','shop','fish','wish']},
  {combo:'ch',ipa:'/tʃ/',words:['chip','lunch','teacher']},
  {combo:'th',ipa:'/θ/ /ð/',words:['think','this','bath','mother']},
  {combo:'ng',ipa:'/ŋ/',words:['sing','ring','morning']},
  {combo:'oo',ipa:'/uː/ /ʊ/',words:['moon','food','book','look']},
  {combo:'ee',ipa:'/iː/',words:['see','tree','sleep']},
  {combo:'ea',ipa:'/iː/ /ɛ/',words:['eat','sea','head','bread']},
  {combo:'ou',ipa:'/aʊ/',words:['out','house','cloud']},
  {combo:'ow',ipa:'/aʊ/ /oʊ/',words:['cow','now','snow','show']},
  {combo:'igh',ipa:'/aɪ/',words:['night','light','right']},
  {combo:'er',ipa:'/ɜː/',words:['her','water','teacher']},
  {combo:'ir',ipa:'/ɜː/',words:['bird','girl','first']},
  {combo:'ur',ipa:'/ɜː/',words:['turn','nurse','purple']},
  {combo:'ar',ipa:'/ɑː/',words:['car','star','park']},
  {combo:'or',ipa:'/ɔː/',words:['for','horse','morning']},
  {combo:'ai/ay',ipa:'/eɪ/',words:['rain','day','play']},
  {combo:'oi/oy',ipa:'/ɔɪ/',words:['coin','boy','enjoy']},
  {combo:'ph',ipa:'/f/',words:['phone','photo','elephant']},
  {combo:'kn',ipa:'/n/',words:['know','knife','knight']},
  {combo:'wr',ipa:'/r/',words:['write','wrong','wrap']},
];

// -- Stress words --
const STRESS_WORDS=[
  {word:'teacher',syls:['TEA','cher'],stress:0},
  {word:'banana',syls:['ba','NA','na'],stress:1},
  {word:'computer',syls:['com','PU','ter'],stress:1},
  {word:'beautiful',syls:['BEAU','ti','ful'],stress:0},
  {word:'today',syls:['to','DAY'],stress:1},
  {word:'animal',syls:['AN','i','mal'],stress:0},
  {word:'begin',syls:['be','GIN'],stress:1},
  {word:'important',syls:['im','POR','tant'],stress:1},
  {word:'elephant',syls:['EL','e','phant'],stress:0},
  {word:'understand',syls:['un','der','STAND'],stress:2},
];

// -- Connected speech examples --
const LINKING_EXAMPLES=[
  {written:'I love it',spoken:'I lov-it',rule:'Consonant + Vowel linking'},
  {written:'turn off',spoken:'tur-noff',rule:'Final consonant links to next vowel'},
  {written:'go away',spoken:'go-waway',rule:'Vowel + Vowel: insert /w/'},
  {written:'the end',spoken:'thee-yend',rule:'Vowel + Vowel: insert /j/'},
  {written:'nice shirt',spoken:'nai-shirt',rule:'Similar sounds merge'},
  {written:'want to',spoken:'wanna',rule:'Reduction: want to → wanna'},
  {written:'going to',spoken:'gonna',rule:'Reduction: going to → gonna'},
  {written:'kind of',spoken:'kinda',rule:'Reduction: of → a'},
];

// -- Shadowing sentences --
const SHADOW_SENTENCES=[
  {text:"I'd like a cup of coffee, please.",speed:'slow'},
  {text:"What time does the train leave?",speed:'slow'},
  {text:"She's been living here for three years.",speed:'medium'},
  {text:"Could you tell me where the station is?",speed:'medium'},
  {text:"I was going to call you, but I forgot.",speed:'fast'},
  {text:"He wouldn't have known if she hadn't told him.",speed:'fast'},
];

// -- Tongue Twisters --
const TONGUE_TWISTERS=[
  {text:'She sells sea shells by the sea shore.',focus:'/ʃ/ and /s/'},
  {text:'Red lorry, yellow lorry.',focus:'/r/ and /l/'},
  {text:'The thirty-three thieves thought they thrilled the throne.',focus:'/θ/ sounds'},
  {text:'Peter Piper picked a peck of pickled peppers.',focus:'/p/ sound'},
  {text:'How much wood would a woodchuck chuck?',focus:'/w/ and /ʊ/'},
  {text:'Eleven benevolent elephants.',focus:'/ɛ/ and /l/'},
];

// -- Game words --
const GAME_WORDS=[
  {word:'cat',level:1,patterns:['c→/k/','a→/æ/','t→/t/'],hint:'3 simple sounds'},
  {word:'dog',level:1,patterns:['d→/d/','o→/ɒ/','g→/g/'],hint:'3 simple sounds'},
  {word:'pen',level:1,patterns:['p→/p/','e→/ɛ/','n→/n/'],hint:'3 simple sounds'},
  {word:'bus',level:1,patterns:['b→/b/','u→/ʌ/','s→/s/'],hint:'3 simple sounds'},
  {word:'hat',level:1,patterns:['h→/h/','a→/æ/','t→/t/'],hint:'3 simple sounds'},
  {word:'run',level:1,patterns:['r→/r/','u→/ʌ/','n→/n/'],hint:'3 simple sounds'},
  {word:'ship',level:2,patterns:['sh→/ʃ/','i→/ɪ/','p→/p/'],hint:'sh = one sound: "shh"'},
  {word:'fish',level:2,patterns:['f→/f/','i→/ɪ/','sh→/ʃ/'],hint:'sh at the end'},

// STAGES (restructured to 5-step guideline + game)

const STAGES=[
  '1. Master Sounds',
  '2. Word & Sentence Stress',
  '3. Connected Speech',
  '4. Shadowing',
  '5. Record & Feedback',
  '🎮 Game'
];
let currentStage=0;

function init(){
  buildStageTabs();
  const main=document.getElementById('main');main.innerHTML='';
  [renderStep1,renderStep2,renderStep3,renderStep4,renderStep5,renderStep6].forEach((fn,i)=>{
    const div=document.createElement('div');div.className='stage';div.id='stage-'+i;
    fn(div);main.appendChild(div);
  });
  goStage(0);
}

function buildStageTabs(){
  const tabs=document.getElementById('stage-tabs');tabs.innerHTML='';
  STAGES.forEach((s,i)=>{
    const b=document.createElement('button');b.className='stab'+(i===currentStage?' active':'');
    b.textContent=s;b.onclick=()=>goStage(i);tabs.appendChild(b);
  });
}
function goStage(n){
  currentStage=n;
  document.querySelectorAll('.stage').forEach(s=>s.classList.remove('show'));
  document.getElementById('stage-'+n).classList.add('show');
  document.getElementById('cur-stage').textContent=n+1;
  buildStageTabs();window.scrollTo({top:0,behavior:'smooth'});
}

function renderStep2(div){
  let h=`<div class="card">

    <div class="tip"><strong>💡 Key concepts:</strong><br>
    • <strong>Word Stress:</strong> Multisyllabic words always have one dominant syllable (TEA-cher, ba-NA-na)<br>
    • <strong>Sentence Stress:</strong> Content words (nouns, verbs, adjectives) are stressed; grammar words (the, a, is, to) are relaxed<br>
    • Use rhythmic activities or tap a pencil to match the natural "music" of English</div>
  </div>`;

  // Word stress exercise
  h+=`<div class="card"><h3>🥁 Word Stress: Click the Stressed Syllable</h3>

    <button class="btn" onclick="chkStress()">✓ Check Answers</button>
    <div class="fb" id="fb-stress"></div>
  </div>`;

  // Sentence stress
  h+=`<div class="card"><h3>🎵 Sentence Stress: Hear the Rhythm</h3>
    <p><span class="strong" style="background:#bbdefb;padding:2px 6px;border-radius:4px;">Blue = STRESSED</span> (loud & clear) · <span style="color:#999;">Grey = weak</span> (quick & quiet)</p>`;
  const sentenceData=[
    {text:'I WANT a BIG cake',parts:[{w:'I',s:false},{w:'WANT',s:true},{w:'a',s:false},{w:'BIG',s:true},{w:'cake',s:true}]},
    {text:'She WENT to the PARK',parts:[{w:'She',s:false},{w:'WENT',s:true},{w:'to',s:false},{w:'the',s:false},{w:'PARK',s:true}]},
    {text:'The CHILDREN are PLAYING in the GARDEN',parts:[{w:'The',s:false},{w:'CHILDREN',s:true},{w:'are',s:false},{w:'PLAYING',s:true},{w:'in',s:false},{w:'the',s:false},{w:'GARDEN',s:true}]},
  ];
  sentenceData.forEach(s=>{
    const words=s.parts.map(p=>p.s?`<span class="strong">${p.w}</span>`:`<span class="weak">${p.w}</span>`).join(' ');
    h+=`<div class="sentence-box"><button class="btn btn-sm" onclick="speakNormal('${s.text}')">🔊</button> ${words}</div>`;
  });
  h+=`</div>`;

  // GAP 3 FIX: Add rhythm tapping exercise
  h+=`<div class="card"><h3>🥁 Rhythm Tapping: Tap the Beat!</h3>
    <p>English has a <strong>DA-da-DA-da</strong> rhythm. Stressed syllables are like strong drum beats. Press the <strong>spacebar</strong> or tap the button along with the rhythm!</p>
    <div id="rhythm-ex" style="margin:12px 0;"></div>
    <div class="tip"><strong>💡 Try this:</strong> Listen to the sentence, then tap spacebar on each STRESSED word. The dots will light up green if you tap in rhythm!</div>
  </div>`;

  h+=`<div class="nav"><button class="nav-btn" onclick="goStage(0)">◀ Step 1</button><button class="nav-btn fwd" onclick="goStage(2)">Step 3: Connected Speech ▶</button></div>`;
  div.innerHTML=h;

  setTimeout(()=>{
    const ex=document.getElementById('stress-ex');if(!ex)return;
    STRESS_WORDS.forEach((w,wi)=>{
      const row=document.createElement('div');
      row.style.cssText='margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;';
      let inner=`<button class="btn btn-sm" onclick="speak('${w.word}',0.7)">🔊</button>`;
      inner+=`<span class="stress-word" id="sw-${wi}">`;
      w.syls.forEach((s,si)=>{inner+=`<span class="syl" onclick="pickStress(${wi},${si})">${s.toLowerCase()}</span>`;});
      inner+=`</span>`;
      row.innerHTML=inner;ex.appendChild(row);
    });

    // Rhythm tapping exercise
    const rhythmEx=document.getElementById('rhythm-ex');if(!rhythmEx)return;
    const rhythmSentences=[
      {text:'I WANT a BIG CAKE',beats:[1,1,0,1,1]},
      {text:'She WENT to the PARK',beats:[0,1,0,0,1]},
      {text:'The CHILDREN are PLAYING',beats:[0,1,0,1]},
    ];
    rhythmSentences.forEach((rs,ri)=>{
      const row=document.createElement('div');

      const words=rs.text.split(' ');
      let dotsHtml=words.map((w,wi)=>{
        const isStrong=rs.beats[wi]===1;
        return `<span style="display:inline-flex;flex-direction:column;align-items:center;margin:0 4px;">
          <span id="rdot-${ri}-${wi}" style="width:${isStrong?'18px':'12px'};height:${isStrong?'18px':'12px'};border-radius:50%;background:${isStrong?'#1565c0':'#ccc'};display:inline-block;margin-bottom:4px;transition:all .2s;"></span>
          <span style="font-size:.8em;${isStrong?'font-weight:700;color:var(--pri-dk);':'color:#999;'}">${w}</span>
        </span>`;
      }).join('');

        <div style="display:flex;align-items:flex-end;gap:2px;flex-wrap:wrap;" id="rhythm-dots-${ri}">${dotsHtml}</div>
      </div>`;
      rhythmEx.appendChild(row);
    });

    // Store rhythm data globally
    window._rhythmData=rhythmSentences;
  },50);
}

function pickStress(wi,si){
  const c=document.getElementById(`sw-${wi}`);
  c.querySelectorAll('.syl').forEach(s=>s.classList.remove('stressed'));
  c.querySelectorAll('.syl')[si].classList.add('stressed');
}
function chkStress(){
  let ok=0;
  STRESS_WORDS.forEach((w,wi)=>{
    const c=document.getElementById(`sw-${wi}`);const syls=c.querySelectorAll('.syl');
    syls.forEach(s=>s.classList.remove('correct','wrong'));
    const picked=[...syls].findIndex(s=>s.classList.contains('stressed'));
    syls[w.stress].classList.add('correct');
    if(picked===w.stress)ok++;
    else if(picked>=0)syls[picked].classList.add('wrong');
  });
  const fb=document.getElementById('fb-stress');
  fb.className=ok===STRESS_WORDS.length?'fb ok':'fb part';
  fb.textContent=ok===STRESS_WORDS.length?`🎉 Perfect! ${ok}/${STRESS_WORDS.length}`:`👍 ${ok}/${STRESS_WORDS.length}. Green = correct stress.`;
}

// Rhythm functions
function playRhythm(ri){
  const rs=window._rhythmData[ri];
  const words=rs.text.split(' ');
  let i=0;
  const interval=setInterval(()=>{
    if(i>=words.length){clearInterval(interval);return;}
    const dot=document.getElementById(`rdot-${ri}-${i}`);
    if(dot){dot.style.background=rs.beats[i]?'#ffd700':'#90caf9';dot.style.transform='scale(1.4)';
      setTimeout(()=>{dot.style.transform='scale(1)';},300);}
    if(rs.beats[i])speak(words[i],1.0);
    i++;
  },500);
}
function startTapping(ri){
  const rs=window._rhythmData[ri];
  const words=rs.text.split(' ');
  let beatIdx=0,startTime=Date.now();
  // Reset dots
  words.forEach((_,wi)=>{const d=document.getElementById(`rdot-${ri}-${wi}`);if(d){d.style.background=rs.beats[wi]?'#1565c0':'#ccc';}});
  // Play the sentence
  speakNormal(rs.text);
  // Listen for spacebar taps
  const handler=(e)=>{
    if(e.code!=='Space'||beatIdx>=words.length)return;
    e.preventDefault();
    const dot=document.getElementById(`rdot-${ri}-${beatIdx}`);
    if(dot){
      if(rs.beats[beatIdx]){dot.style.background='#4caf50';dot.style.transform='scale(1.5)';}
      else{dot.style.background='#ff5722';dot.style.transform='scale(1.3)';}
      setTimeout(()=>{dot.style.transform='scale(1)';},200);
    }
    beatIdx++;
    if(beatIdx>=words.length){document.removeEventListener('keydown',handler);}
  };
  document.addEventListener('keydown',handler);
  setTimeout(()=>document.removeEventListener('keydown',handler),5000);
}

    <div style="display:flex;flex-wrap:wrap;gap:6px;margin:10px 0;" id="rec-words"></div>

          <button class="btn btn-sm" id="rec-native-btn" onclick="hearRecTarget()">🔊 Hear Native</button>

// ═══════════════════════════════
// STEP 6: GAME
// ═══════════════════════════════
let gameState={level:1,score:0,streak:0,total:0,current:null,history:[]};

function renderStep6(div){
  div.innerHTML=`
    <div class="card">
      <h2>🎮 Pronunciation Game</h2>
      <p>A random word appears — figure out how to pronounce it using what you learned, then say it!</p>
      <div class="tip"><strong>How to play:</strong> Look at the word → Think about the sounds → Click 💡 for hints → Click 🔊 to hear → Click 🎤 to test yourself!</div>
    </div>
    <div class="card" style="text-align:center;">
      <div class="game-score">
        <span class="game-badge">Level <span id="g-level">1</span>/5</span>
        <span class="game-badge">Score: <span id="g-score">0</span></span>
        <span class="game-badge">Streak: <span id="g-streak">0</span>🔥</span>
      </div>
      <div class="game-word" id="g-word"></div>
      <div style="font-size:.8em;color:#888;" id="g-level-label"></div>
      <div class="game-patterns" id="g-patterns" style="display:none;"></div>
      <div id="g-hint" style="display:none;" class="warn"></div>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:14px 0;">
        <button class="btn btn-outline" onclick="showGameHints()">💡 Hints</button>
        <button class="btn btn-outline" onclick="hearGameWord()">🔊 Hear It</button>
        <button class="btn" onclick="skipGame()">⏭️ Skip</button>
      </div>
      <div class="mic-area">
        <button class="mic-btn" id="g-mic-btn" onclick="recordGame()">🎤</button>
        <div class="mic-status" id="g-mic-status">Say the word!</div>
        <div id="g-mic-result"></div>
      </div>
    </div>
    <div class="card" id="g-hist-card" style="display:none;"><h3>📊 History</h3><div id="g-hist"></div></div>
    <div class="card"><h3>⚙️ Level</h3><div style="display:flex;gap:6px;flex-wrap:wrap;">
      ${[1,2,3,4,5].map(l=>`<button class="btn btn-sm btn-outline" onclick="setLevel(${l})">Level ${l}</button>`).join('')}
    </div></div>
    <div class="nav"><button class="nav-btn" onclick="goStage(4)">◀ Step 5</button><span style="font-size:.85em;color:var(--pri);">Have fun! 🎉</span></div>`;
  setTimeout(loadGameWord,100);
}

function setLevel(l){gameState={level:l,score:0,streak:0,total:0,current:null,history:[]};document.getElementById('g-hist-card').style.display='none';loadGameWord();}

function loadGameWord(){
  const pool=GAME_WORDS.filter(w=>w.level<=gameState.level);
  const lvlPool=pool.filter(w=>w.level===gameState.level);
  const use=(Math.random()<0.7&&lvlPool.length)?lvlPool:pool;
  gameState.current=use[Math.floor(Math.random()*use.length)];
  const w=gameState.current;
  document.getElementById('g-word').textContent=w.word;
  document.getElementById('g-level-label').textContent=`Level ${w.level}`;
  document.getElementById('g-level').textContent=gameState.level;
  document.getElementById('g-score').textContent=gameState.score;
  document.getElementById('g-streak').textContent=gameState.streak;
  document.getElementById('g-patterns').style.display='none';
  document.getElementById('g-hint').style.display='none';
  document.getElementById('g-mic-result').innerHTML='';
  document.getElementById('g-mic-status').textContent='Say the word!';
}

function showGameHints(){
  const w=gameState.current;if(!w)return;
  document.getElementById('g-patterns').style.display='flex';
  document.getElementById('g-patterns').innerHTML=w.patterns.map(p=>{const[l,s]=p.split('→');return`<span class="game-pattern"><strong>${l}</strong> → <em>${s}</em></span>`;}).join('');
  document.getElementById('g-hint').style.display='block';
  document.getElementById('g-hint').textContent='💡 '+w.hint;
}
function hearGameWord(){if(gameState.current)speak(gameState.current.word,0.6);}
function skipGame(){addHist(gameState.current.word,false,'skipped');gameState.streak=0;gameState.total++;loadGameWord();}

function recordGame(){
  const target=gameState.current?.word;if(!target)return;
  const btn=document.getElementById('g-mic-btn'),st=document.getElementById('g-mic-status'),res=document.getElementById('g-mic-result');
  if(isRecording){stopListening();btn.classList.remove('recording');st.textContent='Say the word!';return;}
  btn.classList.add('recording');st.textContent='🔴 Listening...';res.innerHTML='';
  startListening(text=>{
    btn.classList.remove('recording');st.textContent='Say the word!';
    if(text.includes(target.toLowerCase())||target.toLowerCase().includes(text)){
      const pts=gameState.current.level*10;gameState.score+=pts;gameState.streak++;gameState.total++;
      res.innerHTML=`<span class="mic-result ok">✅ Correct! "${text}" +${pts}pts ${gameState.streak>=3?'🔥'+gameState.streak:''}</span>`;
      addHist(target,true,text);
      if(gameState.streak>=5&&gameState.level<5){gameState.level++;gameState.streak=0;setTimeout(()=>{res.innerHTML+=`<br><span class="mic-result ok">⬆️ Level Up! Level ${gameState.level}!</span>`;},400);}
      setTimeout(loadGameWord,1800);
    } else {
      gameState.streak=0;gameState.total++;
      res.innerHTML=`<span class="mic-result bad">❌ "${text}" — target: "${target}". Click 🔊!</span>`;
      addHist(target,false,text);setTimeout(()=>speak(target,0.6),800);
    }
  },err=>{btn.classList.remove('recording');st.textContent=err;});
}

function addHist(word,ok,spoken){
  gameState.history.unshift({word,ok,spoken});if(gameState.history.length>15)gameState.history.pop();
  const card=document.getElementById('g-hist-card'),el=document.getElementById('g-hist');
  card.style.display='block';
  el.innerHTML=gameState.history.slice(0,8).map(h=>`<div class="game-history-item">${h.ok?'✅':'❌'} <strong>${h.word}</strong> <span style="color:#888;">— "${h.spoken}"</span></div>`).join('');
}

// ═══════════════════════════════
// GENERIC MIC HELPERS
// ═══════════════════════════════
function setMicTarget(prefix,word){
  const el=document.getElementById(prefix+'-target');
  el.textContent=`Say: "${word}"`;el.dataset.word=word;
}

function recordGeneric(prefix){
  const target=document.getElementById(prefix+'-target').dataset.word;
  if(!target){document.getElementById(prefix+'-status').textContent='Click a word first!';return;}
  genericRecord(prefix,target,false);
}

function genericRecord(prefix,target,isSentence){
  const btn=document.getElementById(prefix+'-btn'),st=document.getElementById(prefix+'-status'),res=document.getElementById(prefix+'-result');
  if(isRecording){stopListening();btn.classList.remove('recording');st.textContent='Click to record';return;}
  btn.classList.add('recording');st.textContent='🔴 Listening...';res.innerHTML='';
  startListening(text=>{
    btn.classList.remove('recording');st.textContent='Click to record';
    if(isSentence){
      const tw=target.toLowerCase().replace(/[.,!?']/g,'').split(' ');
      const sw=text.toLowerCase().split(' ');
      const m=tw.filter(w=>sw.includes(w)).length;
      const pct=Math.round(m/tw.length*100);
      res.innerHTML=pct>=75?`<span class="mic-result ok">✅ ${pct}% match! "${text}"</span>`:`<span class="mic-result bad">🔄 ${pct}% — "${text}". Try again!</span>`;
    } else {
      if(text.includes(target.toLowerCase())||target.toLowerCase().includes(text)){
        res.innerHTML=`<span class="mic-result ok">✅ Correct! "${text}"</span>`;
      } else {
        res.innerHTML=`<span class="mic-result bad">❌ "${text}" — target: "${target}"</span>`;
      }
    }
  },err=>{btn.classList.remove('recording');st.textContent=err;});
}

// ═══════════════════════════════
// MEDIARECORDER: Record & Playback
// ═══════════════════════════════
let mediaRecorder=null,audioChunks=[],recStream=null;

function hearRecTarget(){
  const word=document.getElementById('rec-target').dataset.word;
  if(word)speak(word,0.65);
}

async function toggleRecording(){
  const btn=document.getElementById('rec-mic-btn');
  const status=document.getElementById('rec-status');
  const playback=document.getElementById('rec-playback');

  if(mediaRecorder&&mediaRecorder.state==='recording'){
    // Stop recording
    mediaRecorder.stop();
    btn.classList.remove('recording');
    btn.textContent='🎙️';
    status.textContent='Processing...';
    return;
  }

  // Start recording
  try{
    recStream=await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder=new MediaRecorder(recStream);
    audioChunks=[];
    mediaRecorder.ondataavailable=(e)=>{if(e.data.size>0)audioChunks.push(e.data);};
    mediaRecorder.onstop=()=>{
      const blob=new Blob(audioChunks,{type:'audio/webm'});
      const url=URL.createObjectURL(blob);
      const audio=document.getElementById('rec-audio');
      audio.src=url;
      playback.style.display='block';
      status.textContent='Done! Play back your recording and compare.';
      // Stop mic access
      recStream.getTracks().forEach(t=>t.stop());
    };
    mediaRecorder.start();
    btn.classList.add('recording');
    btn.textContent='⏹️';
    status.textContent='🔴 Recording... Click ⏹️ to stop';
    playback.style.display='none';
  }catch(e){
    status.textContent='⚠️ Microphone access denied. Please allow microphone.';
  }
}

function clearRecording(){
  document.getElementById('rec-playback').style.display='none';
  document.getElementById('rec-status').textContent='Click 🎙️ to start recording';
  document.getElementById('rec-audio').src='';
}

// START
init();
</script>
