<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗣️ English Pronunciation — Master Every Sound</title>
<style>
:root{--pri:#2d6a4f;--pri-lt:#95d5b2;--pri-dk:#1b4332;--gold:#c9a227;--bg:#f0fdf4;--card:#fff;--green:#1e6e30;--red:#922020;--blue:#1565c0;--orange:#e65100;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:#2d2d2d;min-height:100vh;}
header{background:linear-gradient(160deg,var(--pri-dk),var(--pri),#40916c);color:#fff;padding:22px 20px;text-align:center;border-bottom:4px solid var(--gold);}
header h1{font-size:clamp(1.4em,5vw,2.1em);color:#fff;margin-bottom:4px;}
header p{font-size:.85em;color:rgba(255,255,255,.75);}
.sticky{position:sticky;top:0;z-index:100;background:var(--pri-dk);padding:7px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:5px;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.badge{background:rgba(149,213,178,.2);border:2px solid var(--pri-lt);border-radius:20px;padding:3px 11px;color:var(--pri-lt);font-weight:700;font-size:.82em;}
.stage-tabs{display:flex;flex-wrap:wrap;gap:3px;}
.stab{padding:4px 9px;border-radius:14px;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.05);color:#fff;font-size:.7em;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;}
.stab:hover{background:rgba(255,255,255,.15);}
.stab.active{border-color:var(--pri-lt);background:rgba(149,213,178,.2);}
main{max-width:920px;margin:10px auto 40px;padding:0 12px;}
.stage{display:none;animation:fadeIn .3s ease;}
.stage.show{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.card{background:var(--card);border-radius:14px;border:2px solid rgba(45,106,79,.12);box-shadow:0 3px 14px rgba(0,0,0,.05);padding:18px;margin-bottom:12px;}
.card h2{font-size:1.1em;color:var(--pri-dk);margin-bottom:6px;}
.card h3{font-size:.92em;color:var(--pri);margin:12px 0 6px;}
.card p{font-size:.86em;line-height:1.55;color:#444;}
.tip{background:#e8f5e9;border:2px solid #a5d6a7;border-radius:10px;padding:9px 12px;margin:8px 0;font-size:.82em;line-height:1.5;color:var(--green);}
.tip strong{color:var(--pri-dk);}

/* Letter cards */
.letter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin:10px 0;}
.letter-card{background:#f8fdf8;border:2px solid #c8e6c9;border-radius:12px;padding:12px;transition:all .2s;cursor:pointer;}
.letter-card:hover{border-color:var(--pri);box-shadow:0 4px 12px rgba(45,106,79,.15);}
.letter-card .top{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.letter-card .big{font-size:2em;font-weight:700;color:var(--pri-dk);width:44px;height:44px;background:#d4edda;border-radius:10px;display:flex;align-items:center;justify-content:center;}
.letter-card .ipa-sym{font-size:1em;color:var(--orange);font-weight:600;font-style:italic;}
.letter-card .how{font-size:.8em;color:#555;line-height:1.4;margin-bottom:6px;}
.letter-card .examples{display:flex;flex-wrap:wrap;gap:4px;}
.ex-btn{background:#fff;border:1.5px solid #ddd;border-radius:16px;padding:3px 10px;font-size:.78em;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:3px;}
.ex-btn:hover{border-color:var(--pri);background:#f0fdf4;transform:scale(1.05);}
.ex-btn:active{transform:scale(.95);}

/* IPA tables */
.ipa-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin:10px 0;}
.ipa-card{background:#fff;border:2px solid #e0e0e0;border-radius:12px;padding:12px;transition:all .2s;}
.ipa-card:hover{border-color:var(--gold);box-shadow:0 3px 10px rgba(201,162,39,.2);}
.ipa-card.short{border-left:4px solid var(--pri);}
.ipa-card.long{border-left:4px solid var(--blue);}
.ipa-card.diph{border-left:4px solid var(--orange);}
.ipa-card.voiceless{border-left:4px solid #666;}
.ipa-card.voiced{border-left:4px solid var(--pri);}
.ipa-card .sym{font-size:1.4em;font-weight:700;color:var(--orange);}
.ipa-card .type-badge{font-size:.65em;background:#eee;border-radius:10px;padding:2px 8px;color:#666;font-weight:600;margin-left:6px;}
.ipa-card .desc{font-size:.8em;color:#555;margin:4px 0;line-height:1.4;}
.ipa-card .words{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}

/* Combo section */
.combo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin:10px 0;}
.combo-card{background:#fffde7;border:2px solid #fff176;border-radius:12px;padding:12px;transition:all .2s;}
.combo-card:hover{border-color:var(--gold);box-shadow:0 3px 10px rgba(201,162,39,.2);}
.combo-card .combo-top{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.combo-card .combo-letters{font-size:1.5em;font-weight:700;color:var(--orange);background:#fff8e1;border-radius:8px;padding:4px 10px;}
.combo-card .combo-ipa{font-size:.9em;color:#666;font-style:italic;}
.combo-card .combo-tip{font-size:.78em;color:#555;margin:4px 0;line-height:1.4;}
.combo-card .words{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}

/* Stress */
.stress-word-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;padding:8px;background:#f9f9f9;border-radius:8px;}
.stress-word-row .syl{padding:6px 10px;border-radius:8px;font-size:1em;border:2px solid #ddd;background:#fff;cursor:pointer;transition:all .2s;}
.stress-word-row .syl:hover{border-color:var(--pri);}
.stress-word-row .syl.stressed{background:var(--pri);color:#fff;border-color:var(--pri);font-weight:700;font-size:1.1em;}
.stress-word-row .syl.correct{background:var(--green);color:#fff;border-color:var(--green);}
.stress-word-row .syl.wrong{background:var(--red);color:#fff;border-color:var(--red);}
.sentence-box{background:#f9f9f9;border:2px solid #e8e8e8;border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:.88em;line-height:1.7;}
.sentence-box .strong{background:#bbdefb;padding:1px 5px;border-radius:4px;font-weight:700;}
.sentence-box .weak{color:#aaa;font-size:.85em;}

/* Game */
.game-word{font-size:clamp(2em,8vw,3.5em);font-weight:700;color:var(--pri-dk);letter-spacing:3px;text-align:center;margin:16px 0 8px;}
.game-patterns{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:10px 0;}
.game-pattern{background:#e8f5e9;border:2px solid #a5d6a7;border-radius:8px;padding:4px 10px;font-size:.85em;}
.game-pattern strong{color:var(--pri-dk);}
.game-pattern em{color:var(--orange);}
.game-badge{background:rgba(45,106,79,.08);border:2px solid var(--pri);border-radius:20px;padding:4px 12px;font-size:.82em;font-weight:600;color:var(--pri-dk);}

/* Mic */
.mic-area{text-align:center;margin:12px 0;padding:14px;background:#f5f5f5;border-radius:12px;border:2px dashed #ccc;}
.mic-btn{width:56px;height:56px;border-radius:50%;border:3px solid var(--pri);background:#fff;cursor:pointer;font-size:1.4em;display:inline-flex;align-items:center;justify-content:center;transition:all .3s;}
.mic-btn:hover{background:#f0fdf4;transform:scale(1.1);}
.mic-btn.recording{border-color:var(--red);background:#ffebee;animation:recPulse 1s infinite;}
@keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(146,32,32,.4);}50%{box-shadow:0 0 0 10px rgba(146,32,32,0);}}
.mic-status{font-size:.8em;color:#666;margin-top:6px;}
.mic-result{margin-top:6px;font-size:.88em;font-weight:600;padding:5px 10px;border-radius:8px;display:inline-block;}
.mic-result.ok{background:#e8f5e9;color:var(--green);}
.mic-result.bad{background:#ffebee;color:var(--red);}

/* Buttons */
.btn{background:linear-gradient(135deg,var(--pri-dk),var(--pri));color:#fff;border:none;border-radius:22px;padding:8px 20px;font-size:.85em;font-weight:700;cursor:pointer;transition:all .2s;margin:3px;}
.btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(45,106,79,.3);}
.btn-sm{padding:5px 12px;font-size:.78em;}
.btn-outline{background:transparent;border:2px solid var(--pri);color:var(--pri);}
.btn-outline:hover{background:var(--pri);color:#fff;}
.nav{display:flex;justify-content:space-between;margin-top:14px;padding-top:10px;border-top:1px solid #eee;}
.nav-btn{background:transparent;border:2px solid var(--gold);color:#5c3d1a;border-radius:18px;padding:6px 14px;cursor:pointer;font-size:.84em;font-weight:600;transition:all .2s;}
.nav-btn:hover{background:var(--gold);color:#1a1a2e;}
.nav-btn.fwd{background:var(--gold);color:#1a1a2e;}
.fb{margin-top:8px;padding:8px 12px;border-radius:8px;font-weight:600;font-size:.84em;display:none;line-height:1.4;}
.fb.ok{background:#e8f5e9;color:var(--green);border:2px solid #a5d6a7;display:block;}
.fb.part{background:#fff8e1;color:#856404;border:2px solid #ffe082;display:block;}
@media(max-width:600px){.letter-grid,.ipa-grid,.combo-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header>
<h1>🗣️ Master Every English Sound</h1>
<p>A-Z letters · 44 IPA sounds · Letter combinations · Stress · Game</p>
</header>
<div class="sticky">
<div class="badge">Step <span id="cur-stage">1</span>/6</div>
<div class="stage-tabs" id="stage-tabs"></div>
</div>
<div id="tts-diag" style="background:#fff8e1;border-bottom:1px solid #ffe082;padding:4px 12px;font-size:.72em;color:#856404;font-family:monospace;text-align:center;">Loading TTS...</div>
<main id="main"></main>

<script>
// ═══════════════════════════════
// TTS — Dual-path with audio fallback
// ═══════════════════════════════
// Primary: speechSynthesis (works in Safari always, Chrome sometimes)
// Fallback: <audio> element with Google Translate TTS URL (works in ALL browsers)
// User can toggle between them via the mode button
var TTS = {
  voices: [],
  preferredVoice: null,
  audioUnlocked: false,
  lastStatus: 'idle',
  isChrome: /Chrome/.test(navigator.userAgent) && !/Edg|OPR/.test(navigator.userAgent),
  chromeFailed: false,

  init: function() {
    var self = this;
    function loadVoices() {
      self.voices = window.speechSynthesis.getVoices();
      if (self.voices.length > 0) {
        var preferred = ['Google US English', 'Samantha', 'Alex', 'Karen', 'Daniel'];
        for (var i = 0; i < preferred.length; i++) {
          self.preferredVoice = self.voices.find(function(v) { return v.name === preferred[i]; });
          if (self.preferredVoice) break;
        }
        if (!self.preferredVoice) self.preferredVoice = self.voices.find(function(v) { return v.lang === 'en-US'; });
        if (!self.preferredVoice) self.preferredVoice = self.voices.find(function(v) { return v.lang.startsWith('en'); });
      }
    }
    loadVoices();
    if (window.speechSynthesis.onvoiceschanged !== undefined) {
      window.speechSynthesis.onvoiceschanged = loadVoices;
    }
    setInterval(function() {
      if (window.speechSynthesis.paused) window.speechSynthesis.resume();
    }, 10000);
  },

  unlock: function() {
    if (this.audioUnlocked) return;
    this.audioUnlocked = true;
    try {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (AC) {
        var ctx = new AC();
        var buf = ctx.createBuffer(1, 1, 22050);
        var src = ctx.createBufferSource();
        src.buffer = buf;
        src.connect(ctx.destination);
        src.start(0);
      }
    } catch(e) {}
    try {
      var u = new SpeechSynthesisUtterance(' ');
      u.volume = 0;
      window.speechSynthesis.speak(u);
    } catch(e) {}
  },

  speak: function(text, rate) {
    this.unlock();
    rate = rate || 0.7;
    var self = this;
    self.lastStatus = 'requested: ' + text;
    self.updateDiag();

    if (window.speechSynthesis.speaking || window.speechSynthesis.pending) {
      window.speechSynthesis.cancel();
    }
    if (window.speechSynthesis.paused) window.speechSynthesis.resume();

    var u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US';
    u.rate = rate;
    u.pitch = 1.05;
    u.volume = 1.0;
    if (this.preferredVoice) u.voice = this.preferredVoice;

    var eventFired = false;
    u.onstart = function() { eventFired = true; self.lastStatus = '🔊 speaking: ' + text; self.updateDiag(); };
    u.onend = function() { eventFired = true; self.lastStatus = '✅ done: ' + text; self.updateDiag(); };
    u.onerror = function(e) { self.lastStatus = '❌ error: ' + (e.error || 'unknown'); self.updateDiag(); };

    window.speechSynthesis.speak(u);

    if (this.isChrome) {
      setTimeout(function() {
        if (!eventFired && !window.speechSynthesis.speaking) {
          self.chromeFailed = true;
          self.lastStatus = '⚠️ Chrome TTS silent — try Safari or click 🔍 for help';
          self.updateDiag();
        }
      }, 2000);
    }
  },

  runDiagnostic: function() {
    var lines = [];
    lines.push('=== TTS Diagnostic ===');
    lines.push('Browser: ' + (this.isChrome ? 'Chrome' : 'Other'));
    lines.push('speechSynthesis: ' + ('speechSynthesis' in window ? 'YES' : 'NO'));
    lines.push('Voices loaded: ' + this.voices.length);
    lines.push('Selected voice: ' + (this.preferredVoice ? this.preferredVoice.name : 'NONE'));
    lines.push('');
    if (this.isChrome && this.chromeFailed) {
      lines.push('⚠️ Chrome is silently failing TTS.');
      lines.push('');
      lines.push('Try these solutions in order:');
      lines.push('1. Right-click Chrome tab → check "Unmute site"');
      lines.push('2. chrome://settings/content/sound → allow this site');
      lines.push('3. Disable ad-blocker/privacy extensions');
      lines.push('4. Quit Chrome completely and reopen');
      lines.push('5. Use Safari — TTS works reliably there');
    } else {
      lines.push('✅ TTS appears functional');
      lines.push('Click any word to hear pronunciation');
    }
    alert(lines.join('\n'));
  },

  updateDiag: function() {
    var el = document.getElementById('tts-diag');
    if (el) {
      el.innerHTML = '<span>' + this.lastStatus + '</span>' +
        ' <button onclick="TTS.runDiagnostic()" style="margin-left:10px;padding:2px 8px;font-size:.9em;border-radius:12px;border:1px solid #856404;background:#fff8e1;color:#856404;cursor:pointer;font-weight:600;">🔍 Help</button>' +
        ' <span style="opacity:.7;font-size:.85em;">voice: ' + (this.preferredVoice ? this.preferredVoice.name : 'none') + '</span>';
    }
  }
};

TTS.init();
document.addEventListener('click', function() { TTS.unlock(); }, { once: true });
document.addEventListener('touchstart', function() { TTS.unlock(); }, { once: true });
setTimeout(function() { TTS.updateDiag(); }, 200);

function speak(text, rate) { TTS.speak(text, rate); }

// Speech Recognition
let recognition=null,isRecording=false;
function startListening(onResult,onEnd){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){onEnd('Not supported');return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();recognition.lang='en-US';recognition.continuous=false;recognition.interimResults=false;
  recognition.onresult=(e)=>{onResult(e.results[0][0].transcript.toLowerCase().trim());};
  recognition.onerror=()=>{onEnd('Could not hear. Try again!');};
  recognition.onend=()=>{isRecording=false;};
  recognition.start();isRecording=true;
}
function stopListening(){if(recognition)recognition.stop();isRecording=false;}

// Helper: make a speak button
function spkBtn(word,label){
  return `<button class="ex-btn" onclick="speak('${word.replace(/'/g,"\\'")}',0.65)">🔊 ${label||word}</button>`;
}

// ═══════════════════════════════
// DATA
// ═══════════════════════════════

const LETTERS=[
{l:'A',ipa:'/æ/',how:'Open mouth wide, tongue flat and low',ex:['apple','ant','ask','cat','hat','man']},
{l:'B',ipa:'/b/',how:'Press lips together, pop open WITH voice (feel throat buzz)',ex:['ball','bed','big','bus','baby','book']},
{l:'C',ipa:'/k/ or /s/',how:'Hard C: back of tongue hits palate (cat). Soft C before e/i: like S (city)',ex:['cat','cup','car','city','circle','nice']},
{l:'D',ipa:'/d/',how:'Tongue tip taps ridge behind top teeth, WITH voice',ex:['dog','dad','day','door','duck','dinner']},
{l:'E',ipa:'/ɛ/',how:'Mouth slightly open, tongue in middle',ex:['egg','end','ten','bed','red','get']},
{l:'F',ipa:'/f/',how:'Top teeth gently on lower lip, blow air (NO voice)',ex:['fish','fun','five','food','finger','family']},
{l:'G',ipa:'/g/',how:'Back of tongue hits soft palate, WITH voice',ex:['go','get','girl','good','game','green']},
{l:'H',ipa:'/h/',how:'Open mouth, gentle breath out (like fogging a mirror)',ex:['hat','home','help','hot','happy','hand']},
{l:'I',ipa:'/ɪ/',how:'Small smile, tongue slightly raised in front',ex:['it','in','is','big','sit','swim']},
{l:'J',ipa:'/dʒ/',how:'Tongue on roof, release like D+ZH together',ex:['jump','job','juice','jam','jelly','join']},
{l:'K',ipa:'/k/',how:'Back tongue hits soft palate, no voice (same as hard C)',ex:['kite','king','keep','kick','kind','key']},
{l:'L',ipa:'/l/',how:'Tongue tip touches ridge, air flows around sides',ex:['leg','look','like','let','love','little']},
{l:'M',ipa:'/m/',how:'Press lips together, hum through nose',ex:['map','mum','milk','moon','money','morning']},
{l:'N',ipa:'/n/',how:'Tongue tip on ridge, hum through nose',ex:['nose','no','name','new','night','number']},
{l:'O',ipa:'/ɒ/',how:'Round lips, mouth open, tongue low and back',ex:['on','off','hot','dog','orange','box']},
{l:'P',ipa:'/p/',how:'Lips pop with a puff of air (NO voice — like B but silent throat)',ex:['pen','park','pig','put','play','people']},
{l:'Q',ipa:'/kw/',how:'Say K then quickly round lips for W (always with U)',ex:['queen','quick','quiz','quiet','quite','question']},
{l:'R',ipa:'/r/',how:'Tongue curls back, does NOT touch the roof!',ex:['run','red','rain','room','right','read']},
{l:'S',ipa:'/s/',how:'Tongue near ridge, air hisses through (like a snake: sss)',ex:['sun','see','sit','say','school','stop']},
{l:'T',ipa:'/t/',how:'Tongue tip taps ridge, puff of air (NO voice — like D but silent throat)',ex:['ten','top','time','two','table','teacher']},
{l:'U',ipa:'/ʌ/',how:'Relaxed open mouth, tongue in centre, short',ex:['up','us','under','cup','bus','fun']},
{l:'V',ipa:'/v/',how:'Top teeth on lower lip (like F) but ADD voice — feel buzz!',ex:['van','very','voice','visit','video','village']},
{l:'W',ipa:'/w/',how:'Round lips tightly (like blowing a candle), then open',ex:['wet','win','walk','water','want','window']},
{l:'X',ipa:'/ks/',how:'Two sounds together: K+S (usually at end of words)',ex:['box','six','fox','mix','next','taxi']},
{l:'Y',ipa:'/j/',how:'Tongue raised near roof, quick "ee" then open',ex:['yes','you','year','yellow','young','yesterday']},
{l:'Z',ipa:'/z/',how:'Same tongue as S but ADD voice — feel the buzz (like a bee: zzz)',ex:['zoo','zip','zero','zone','pizza','amazing']},
];

const VOWELS=[
{n:1,sym:'/æ/',type:'short',how:'Open mouth WIDE, tongue flat and low. Like saying "ahh" at the doctor but shorter.',ex:['cat','hat','man','bad','ran','apple','hand','black'],from:['a (cat, hat, man, black)']},
{n:2,sym:'/ɛ/',type:'short',how:'Mouth slightly open. Tongue in the middle — not too high, not too low.',ex:['bed','red','ten','pen','leg','head','bread','said'],from:['e (bed, red, ten)','ea (head, bread, dead)','ai (said)']},
{n:3,sym:'/ɪ/',type:'short',how:'Small smile. Tongue slightly raised at the front. Quick and short!',ex:['sit','big','lip','hit','pin','fish','give','swim'],from:['i (sit, big, fish)','y (gym, myth)','u (busy, business)','ui (build, guitar)']},
{n:4,sym:'/ɒ/',type:'short',how:'Round your lips into a circle. Mouth open. Tongue low and back.',ex:['hot','dog','pot','box','top','stop','clock','sock'],from:['o (hot, dog, box)','a (want, was, watch)']},
{n:5,sym:'/ʌ/',type:'short',how:'Relaxed open mouth. Tongue in the centre. Like a surprised "uh!"',ex:['cup','bus','run','sun','fun','love','money','come'],from:['u (cup, bus, run)','o (love, come, money, son)','ou (young, touch, country)']},
{n:6,sym:'/ʊ/',type:'short',how:'Lips slightly rounded but relaxed. Quick and light.',ex:['book','look','good','put','push','pull','foot','wood'],from:['oo (book, look, good)','u (put, push, pull, full)','ou (could, would, should)']},
{n:7,sym:'/ə/',type:'short',how:'The LAZIEST sound! Mouth barely open, totally relaxed. The most common English sound!',ex:['about','banana','teacher','water','sofa','computer','famous','again'],from:['a (about, banana, again)','e (taken, open, the)','i (animal, pencil)','o (computer, today)','u (circus, supply)','er (teacher, water)','or (doctor, actor)','ar (sugar, popular)']},

// APP STRUCTURE
// ═══════════════════════════════
const STAGES=['A–Z Letters','20 Vowels','24 Consonants','Combinations','Stress','🎮 Game'];
let currentStage=0;

function init(){
  buildTabs();
  const main=document.getElementById('main');main.innerHTML='';
  [renderS1,renderS2,renderS3,renderS4,renderS5,renderS6].forEach((fn,i)=>{
    const d=document.createElement('div');d.className='stage';d.id='stage-'+i;
    fn(d);main.appendChild(d);
  });
  goStage(0);
}
function buildTabs(){
  const t=document.getElementById('stage-tabs');t.innerHTML='';
  STAGES.forEach((s,i)=>{const b=document.createElement('button');b.className='stab'+(i===currentStage?' active':'');b.textContent=s;b.onclick=()=>goStage(i);t.appendChild(b);});
}
function goStage(n){currentStage=n;document.querySelectorAll('.stage').forEach(s=>s.classList.remove('show'));document.getElementById('stage-'+n).classList.add('show');document.getElementById('cur-stage').textContent=n+1;buildTabs();window.scrollTo({top:0,behavior:'smooth'});}

// ═══════════════════════════════
function renderS1(div){
  let h=`<div class="card"><h2>🔤 Step 1: Pronunciation of Every Letter (A–Z)</h2>
    <p>Learn the <strong>SOUND</strong> each letter makes. Click any word to hear it pronounced.</p>
    <div class="tip"><strong>💡 Remember:</strong> The letter NAME (A = "ay") is different from the letter SOUND (A = /æ/ as in "apple"). Focus on the SOUND!</div>
  </div><div class="letter-grid">`;
  LETTERS.forEach(lt=>{
    h+=`<div class="letter-card">
      <div class="top"><span class="big">${lt.l}</span><span class="ipa-sym">${lt.ipa}</span></div>
      <div class="how">🗣️ ${lt.how}</div>
      <div class="examples">${lt.ex.map(w=>spkBtn(w)).join('')}</div>
    </div>`;
  });
  h+=`</div><div class="nav"><span></span><button class="nav-btn fwd" onclick="goStage(1)">Step 2: Vowels ▶</button></div>`;
  div.innerHTML=h;
}

    <strong>Letter E</strong> → /ɛ/ (b<b>e</b>d), /iː/ (m<b>e</b>), /ɜː/ (h<b>e</b>r), /ə/ (tak<b>e</b>n) — <em>4 sounds</em><br>
    <strong>Letter I</strong> → /ɪ/ (s<b>i</b>t), /aɪ/ (l<b>i</b>ke), /ɜː/ (b<b>i</b>rd), /ə/ (an<b>i</b>mal) — <em>4 sounds</em><br>
    <strong>Letter O</strong> → /ɒ/ (h<b>o</b>t), /oʊ/ (g<b>o</b>), /ɔː/ (f<b>o</b>r), /ʌ/ (l<b>o</b>ve), /uː/ (d<b>o</b>) — <em>5 sounds</em><br>
    <strong>Letter U</strong> → /ʌ/ (c<b>u</b>p), /uː/ (bl<b>u</b>e), /ʊ/ (p<b>u</b>t), /juː/ (c<b>u</b>te), /ə/ (circ<b>u</b>s) — <em>5 sounds</em><br><br>
    Plus <strong>combinations</strong> of vowels make diphthongs: ai→/eɪ/, ou→/aʊ/, oi→/ɔɪ/, etc.<br>
    That's how 5 little letters create 20 different sounds!</div>
    <div class="tip"><strong>💡 The 3 types:</strong><br>
    • <strong>Short vowels (7):</strong> Quick and sharp — your mouth barely moves<br>
    • <strong>Long vowels (5):</strong> Held longer — same mouth shape but stretched<br>
    • <strong>Diphthongs (8):</strong> Two sounds GLIDING together — your mouth MOVES from one shape to another!</div>
  </div><div class="ipa-grid">`;
  VOWELS.forEach((v,vi)=>{
    const cls=v.type==='short'?'short':v.type==='long'?'long':'diph';
    const fromHtml=v.from.map(f=>`<span style="display:inline-block;background:#fff8e1;border:1px solid #ffe082;border-radius:12px;padding:2px 8px;font-size:.78em;margin:2px;color:#e65100;font-weight:600;">${f}</span>`).join('');
    h+=`<div class="ipa-card ${cls}">
      <div><span class="sym">${v.sym}</span><span class="type-badge">${v.type}</span></div>
      <div class="desc">🗣️ ${v.how}</div>
      <div class="words">${v.ex.map(w=>spkBtn(w)).join('')}</div>
      <button class="ex-btn" style="margin-top:8px;background:#fffde7;border-color:#ffe082;color:#e65100;" onclick="event.stopPropagation();var p=document.getElementById('vfrom-${vi}');p.style.display=p.style.display==='none'?'block':'none';">📝 Show/Hide Spellings</button>
      <div class="from-info" id="vfrom-${vi}" style="display:none;margin-top:8px;padding:8px;background:#fffde7;border-radius:8px;border:1px solid #fff176;">
        <div style="font-size:.75em;font-weight:700;color:#e65100;margin-bottom:4px;">📝 This sound can be spelled as:</div>
        <div style="display:flex;flex-wrap:wrap;gap:2px;">${fromHtml}</div>
      </div>
    </div>`;
  });
  h+=`</div><div class="nav"><button class="nav-btn" onclick="goStage(0)">◀ Step 1</button><button class="nav-btn fwd" onclick="goStage(2)">Step 3: Consonants ▶</button></div>`;
  div.innerHTML=h;
}

// ═══════════════════════════════
// STEP 3: 24 CONSONANTS
// ═══════════════════════════════
function renderS3(div){
  let h=`<div class="card"><h2>🦷 Step 3: All 24 Consonant Sounds</h2>
    <p>The <strong>21 consonant letters</strong> (B C D F G H J K L M N P Q R S T V W X Y Z) make <strong>24 sounds</strong>.</p>
    <div class="tip"><strong>💡 Why 21 letters → 24 sounds?</strong> Some letters share sounds, and some combinations create NEW sounds:<br><br>
    <strong>Extra sounds not from a single letter:</strong><br>
    • <strong>/ŋ/</strong> (si<b>ng</b>) — no single letter makes this! Only "ng" together<br>
    • <strong>/ʃ/</strong> (<b>sh</b>ip) — "sh" together makes a new sound<br>
    • <strong>/ʒ/</strong> (mea<b>s</b>ure) — hidden in some words, no letter for it<br>
    • <strong>/tʃ/</strong> (<b>ch</b>ip) — "ch" together = /t/ + /ʃ/ combined<br>
    • <strong>/dʒ/</strong> (<b>j</b>ump) — letter J makes this, also "ge" (bri<b>dge</b>)<br>
    • <strong>/θ/</strong> (<b>th</b>ink) — "th" makes a sound no single letter has!<br>
    • <strong>/ð/</strong> (<b>th</b>is) — same "th" letters but WITH voice = different sound!<br><br>
    <strong>Letters that share sounds:</strong><br>
    • C and K both make /k/ (cat = kat)<br>
    • C and S both make /s/ (city, sun)<br>
    • X = /k/ + /s/ together (bo<b>x</b> = "boks")<br>
    • Q = /k/ + /w/ together (<b>qu</b>een = "kween")<br><br>
    So: 21 letters − shared sounds + new combo sounds = <strong>24 unique sounds!</strong></div>
    <div class="tip"><strong>💡 Voiced vs Voiceless — the key concept:</strong><br>
    • <strong>Voiceless (9):</strong> No throat buzz (whisper-like): /p/ /t/ /k/ /f/ /θ/ /s/ /ʃ/ /tʃ/ /h/<br>
    • <strong>Voiced (15):</strong> Throat BUZZES: /b/ /d/ /g/ /v/ /ð/ /z/ /ʒ/ /dʒ/ /m/ /n/ /ŋ/ /l/ /r/ /w/ /j/<br><br>
    👋 <strong>Try this:</strong> Put your hand on your throat. Say "fffff" (no buzz) then "vvvvv" (buzz!). Same mouth position, different voice!</div>
  </div><div class="ipa-grid">`;
  CONSONANTS.forEach((c,ci)=>{
    const cls=c.v==='voiceless'?'voiceless':'voiced';
    const fromHtml=c.from.map(f=>`<span style="display:inline-block;background:#e3f2fd;border:1px solid #90caf9;border-radius:12px;padding:2px 8px;font-size:.78em;margin:2px;color:#1565c0;font-weight:600;">${f}</span>`).join('');
    h+=`<div class="ipa-card ${cls}">
      <div><span class="sym">${c.sym}</span><span class="type-badge">${c.type} · ${c.v}</span></div>
      <div class="desc">🗣️ ${c.how}</div>
      <div class="words">${c.ex.map(w=>spkBtn(w)).join('')}</div>
      <button class="ex-btn" style="margin-top:8px;background:#e8f4fd;border-color:#90caf9;color:#1565c0;" onclick="event.stopPropagation();var p=document.getElementById('cfrom-${ci}');p.style.display=p.style.display==='none'?'block':'none';">📝 Show/Hide Spellings</button>
      <div class="from-info" id="cfrom-${ci}" style="display:none;margin-top:8px;padding:8px;background:#e8f4fd;border-radius:8px;border:1px solid #90caf9;">
        <div style="font-size:.75em;font-weight:700;color:#1565c0;margin-bottom:4px;">📝 This sound can be spelled as:</div>
        <div style="display:flex;flex-wrap:wrap;gap:2px;">${fromHtml}</div>
      </div>
    </div>`;
  });
  h+=`</div><div class="nav"><button class="nav-btn" onclick="goStage(1)">◀ Step 2</button><button class="nav-btn fwd" onclick="goStage(3)">Step 4: Combinations ▶</button></div>`;
  div.innerHTML=h;
}

// ═══════════════════════════════
// STEP 4: LETTER COMBINATIONS
// ═══════════════════════════════
function renderS4(div){
  let h=`<div class="card"><h2>🔗 Step 4: Common Letter Combinations</h2>
    <p>When letters come together, they often make a <strong>completely different sound</strong>. These are essential to know!</p>
    <div class="tip"><strong>💡 Key idea:</strong> S + H together = "sh" (not "s" then "h"). Learn these patterns and you can pronounce most English words correctly!</div>
  </div><div class="combo-grid">`;
  COMBOS.forEach(cb=>{
    h+=`<div class="combo-card">
      <div class="combo-top"><span class="combo-letters">${cb.c}</span><span class="combo-ipa">${cb.ipa}</span></div>
      <div class="combo-tip">🗣️ ${cb.how}</div>
      <div class="words">${cb.ex.map(w=>{const clean=w.replace(/ \/.*\//,'');return spkBtn(clean,w);}).join('')}</div>
    </div>`;
  });
  h+=`</div><div class="nav"><button class="nav-btn" onclick="goStage(2)">◀ Step 3</button><button class="nav-btn fwd" onclick="goStage(4)">Step 5: Stress ▶</button></div>`;
  div.innerHTML=h;
}

// ═══════════════════════════════
// STEP 5: WORD & SENTENCE STRESS
// ═══════════════════════════════
function renderS5(div){
  let h=`<div class="card"><h2>🥁 Step 5: Word & Sentence Stress</h2>
    <p>English is a <strong>"stress-timed"</strong> language. One syllable in each word is LOUDER and LONGER.</p>
    <div class="tip"><strong>💡 Word Stress:</strong> Every multisyllable word has ONE dominant beat: TEA-cher, ba-NA-na, com-PU-ter<br>
    <strong>💡 Sentence Stress:</strong> Content words (nouns, verbs, adjectives) are strong. Grammar words (the, a, is) are weak and fast.</div>
  </div>`;
  h+=`<div class="card"><h3>Click the STRESSED syllable (listen first!):</h3><div id="stress-ex"></div>
    <button class="btn" onclick="chkStress()">✓ Check</button><div class="fb" id="fb-stress"></div></div>`;
  // Sentence stress
  h+=`<div class="card"><h3>🎵 Sentence Stress</h3><p style="margin-bottom:8px;"><span class="strong" style="background:#bbdefb;padding:2px 5px;border-radius:4px;">Blue = LOUD</span> · <span style="color:#aaa;">Grey = quiet & fast</span></p>`;
  const sents=[
    {text:'I WANT a BIG cake',parts:[{w:'I',s:0},{w:'WANT',s:1},{w:'a',s:0},{w:'BIG',s:1},{w:'cake',s:1}]},
    {text:'She WENT to the PARK yesterday',parts:[{w:'She',s:0},{w:'WENT',s:1},{w:'to',s:0},{w:'the',s:0},{w:'PARK',s:1},{w:'yesterday',s:1}]},
    {text:'The CHILDREN are PLAYING in the GARDEN',parts:[{w:'The',s:0},{w:'CHILDREN',s:1},{w:'are',s:0},{w:'PLAYING',s:1},{w:'in',s:0},{w:'the',s:0},{w:'GARDEN',s:1}]},
    {text:'Can you HELP me FIND the STATION',parts:[{w:'Can',s:0},{w:'you',s:0},{w:'HELP',s:1},{w:'me',s:0},{w:'FIND',s:1},{w:'the',s:0},{w:'STATION',s:1}]},
  ];
  sents.forEach(s=>{
    const ws=s.parts.map(p=>p.s?`<span class="strong">${p.w}</span>`:`<span class="weak">${p.w}</span>`).join(' ');
    h+=`<div class="sentence-box">${spkBtn(s.text,'🔊')} ${ws}</div>`;
  });
  h+=`</div><div class="nav"><button class="nav-btn" onclick="goStage(3)">◀ Step 4</button><button class="nav-btn fwd" onclick="goStage(5)">🎮 Game ▶</button></div>`;
  div.innerHTML=h;
  setTimeout(()=>{
    const ex=document.getElementById('stress-ex');if(!ex)return;
    STRESS_WORDS.forEach((w,wi)=>{
      const row=document.createElement('div');row.className='stress-word-row';
      row.innerHTML=`<button class="btn btn-sm" onclick="speak('${w.word}',0.7)">🔊</button><span style="min-width:90px;font-size:.85em;color:#666;">${w.word}:</span>
        ${w.syls.map((s,si)=>`<span class="syl" onclick="pickS(${wi},${si})">${s.toLowerCase()}</span>`).join('')}`;
      ex.appendChild(row);
    });
  },50);
}
function pickS(wi,si){
  const row=document.querySelectorAll('.stress-word-row')[wi];
  row.querySelectorAll('.syl').forEach(s=>s.classList.remove('stressed'));
  row.querySelectorAll('.syl')[si].classList.add('stressed');
}
function chkStress(){
  let ok=0;
  STRESS_WORDS.forEach((w,wi)=>{
    const row=document.querySelectorAll('.stress-word-row')[wi];
    const syls=row.querySelectorAll('.syl');
    syls.forEach(s=>s.classList.remove('correct','wrong'));
    const picked=[...syls].findIndex(s=>s.classList.contains('stressed'));
    syls[w.stress].classList.add('correct');
    if(picked===w.stress)ok++;else if(picked>=0)syls[picked].classList.add('wrong');
  });
  const fb=document.getElementById('fb-stress');
  fb.className=ok===STRESS_WORDS.length?'fb ok':'fb part';
  fb.textContent=ok===STRESS_WORDS.length?`🎉 Perfect! ${ok}/${STRESS_WORDS.length}`:`👍 ${ok}/${STRESS_WORDS.length}. Green = correct.`;
}

// ═══════════════════════════════
// STEP 6: GAME
// ═══════════════════════════════
let G={level:1,score:0,streak:0,total:0,cur:null,hist:[]};

function renderS6(div){
  div.innerHTML=`<div class="card"><h2>🎮 Pronunciation Game</h2>
    <p>A word appears — figure out how to say it using letter sounds and combinations!</p>
    <div class="tip"><strong>How to play:</strong> See the word → Think about sounds → Click 💡 for hints → Click 🔊 to hear → Click 🎤 to test yourself!</div></div>
  <div class="card" style="text-align:center;">
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:10px;">
      <span class="game-badge">Level <span id="g-lv">1</span>/5</span>
      <span class="game-badge">Score: <span id="g-sc">0</span></span>
      <span class="game-badge">🔥<span id="g-st">0</span></span>
    </div>
    <div class="game-word" id="g-w"></div>
    <div style="font-size:.8em;color:#888;" id="g-ll"></div>
    <div class="game-patterns" id="g-p" style="display:none;"></div>
    <div id="g-h" style="display:none;background:#fff3e0;border:2px solid #ffcc80;border-radius:8px;padding:6px 10px;margin:8px auto;max-width:350px;font-size:.82em;color:#e65100;"></div>
    <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:12px 0;">
      <button class="btn btn-outline" onclick="showHints()">💡 Hints</button>
      <button class="btn btn-outline" onclick="hearGW()">🔊 Hear</button>
      <button class="btn" onclick="skipGW()">⏭️ Skip</button>
    </div>
    <div class="mic-area">
      <button class="mic-btn" id="g-mic" onclick="recGame()">🎤</button>
      <div class="mic-status" id="g-ms">Say the word!</div>
      <div id="g-mr"></div>
    </div>
  </div>
  <div class="card" id="g-hc" style="display:none;"><h3>📊 History</h3><div id="g-hi"></div></div>
  <div class="card"><h3>⚙️ Level</h3><div style="display:flex;gap:5px;flex-wrap:wrap;">${[1,2,3,4,5].map(l=>`<button class="btn btn-sm btn-outline" onclick="setLv(${l})">Level ${l}</button>`).join('')}</div></div>
  <div class="nav"><button class="nav-btn" onclick="goStage(4)">◀ Step 5</button><span style="font-size:.82em;color:var(--pri);">Have fun! 🎉</span></div>`;
  setTimeout(loadGW,100);
}

function setLv(l){G={level:l,score:0,streak:0,total:0,cur:null,hist:[]};document.getElementById('g-hc').style.display='none';loadGW();}
function loadGW(){
  const pool=GAME_WORDS.filter(w=>w.level<=G.level);
  const lp=pool.filter(w=>w.level===G.level);
  G.cur=(Math.random()<.7&&lp.length?lp:pool)[Math.floor(Math.random()*(Math.random()<.7&&lp.length?lp:pool).length)];
  document.getElementById('g-w').textContent=G.cur.word;
  document.getElementById('g-ll').textContent='Level '+G.cur.level;
  document.getElementById('g-lv').textContent=G.level;
  document.getElementById('g-sc').textContent=G.score;
  document.getElementById('g-st').textContent=G.streak;
  document.getElementById('g-p').style.display='none';
  document.getElementById('g-h').style.display='none';
  document.getElementById('g-mr').innerHTML='';
  document.getElementById('g-ms').textContent='Say the word!';
}
function showHints(){
  const w=G.cur;if(!w)return;
  document.getElementById('g-p').style.display='flex';
  document.getElementById('g-p').innerHTML=w.patterns.map(p=>{const[l,s]=p.split('→');return`<span class="game-pattern"><strong>${l}</strong> → <em>${s}</em></span>`;}).join('');
  document.getElementById('g-h').style.display='block';
  document.getElementById('g-h').textContent='💡 '+w.hint;
}
function hearGW(){if(G.cur)speak(G.cur.word,0.6);}
function skipGW(){addH(G.cur.word,false,'skipped');G.streak=0;G.total++;loadGW();}
function recGame(){
  if(!G.cur)return;const target=G.cur.word;
  const btn=document.getElementById('g-mic'),st=document.getElementById('g-ms'),res=document.getElementById('g-mr');
  if(isRecording){stopListening();btn.classList.remove('recording');st.textContent='Say the word!';return;}
  btn.classList.add('recording');st.textContent='🔴 Listening...';res.innerHTML='';
  startListening(text=>{
    btn.classList.remove('recording');st.textContent='Say the word!';
    if(text.includes(target.toLowerCase())||target.toLowerCase()===text){
      const pts=G.cur.level*10;G.score+=pts;G.streak++;G.total++;
      res.innerHTML=`<span class="mic-result ok">✅ "${text}" +${pts}pts ${G.streak>=3?'🔥'+G.streak:''}</span>`;
      addH(target,true,text);
      if(G.streak>=5&&G.level<5){G.level++;G.streak=0;setTimeout(()=>{res.innerHTML+=`<br><span class="mic-result ok">⬆️ Level ${G.level}!</span>`;},300);}
      setTimeout(loadGW,1500);
    }else{
      G.streak=0;G.total++;
      res.innerHTML=`<span class="mic-result bad">❌ "${text}" — target: "${target}"</span>`;
      addH(target,false,text);setTimeout(()=>speak(target,0.6),600);
    }
  },err=>{btn.classList.remove('recording');st.textContent=err;});
}
function addH(word,ok,spoken){
  G.hist.unshift({word,ok,spoken});if(G.hist.length>12)G.hist.pop();
  const c=document.getElementById('g-hc'),el=document.getElementById('g-hi');c.style.display='block';
  el.innerHTML=G.hist.slice(0,8).map(h=>`<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid #eee;font-size:.82em;">${h.ok?'✅':'❌'} <strong>${h.word}</strong> <span style="color:#888;">"${h.spoken}"</span></div>`).join('');
}

init();
</script>
</body>
</html>
